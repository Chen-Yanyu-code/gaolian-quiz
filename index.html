<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高中数学联赛填空题刷题系统</title>
<style>
/* ========== 全局样式 ========== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Microsoft YaHei", "SimSun", sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }

/* ========== 顶部导航栏 ========== */
.top-bar {
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  color: #fff; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.top-bar h1 { font-size: 22px; font-weight: 700; letter-spacing: 2px; }
.top-bar h1 span { color: #e94560; }
.top-bar .stats { font-size: 14px; color: #aab; }
.top-bar .stats b { color: #e94560; font-size: 18px; }

/* ========== 主内容区 ========== */
.main-container { max-width: 960px; margin: 0 auto; padding: 20px 16px; }

/* ========== 筛选栏 ========== */
.filter-bar {
  background: #fff; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
}
.filter-bar label { font-size: 14px; color: #666; margin-right: 4px; }
.filter-bar select, .filter-bar button {
  padding: 6px 14px; border-radius: 6px; border: 1px solid #d0d0d0; font-size: 14px;
  background: #fafafa; cursor: pointer; transition: all 0.2s;
}
.filter-bar select:hover, .filter-bar button:hover { border-color: #0f3460; }
.filter-btn {
  background: #0f3460 !important; color: #fff !important; border-color: #0f3460 !important;
  font-weight: 600;
}
.filter-btn:hover { background: #1a1a2e !important; }

/* ========== 计时练习按钮 ========== */
.timer-btn {
  background: linear-gradient(135deg, #e74c3c, #c0392b) !important; color: #fff !important;
  border: none; padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; margin-left: 8px;
}
.timer-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(231,76,60,0.4); }

/* ========== 计时练习面板 ========== */
.timed-panel {
  background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; border-radius: 12px;
  padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  animation: slideDown 0.3s ease;
}
@keyframes slideDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
.timed-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.timed-title { font-size: 18px; font-weight: 700; }
.timed-timer {
  font-size: 36px; font-weight: 700; font-family: 'Courier New', monospace;
  background: rgba(255,255,255,0.1); padding: 4px 16px; border-radius: 8px;
}
.timed-timer.warning { color: #f39c12; animation: pulse 1s infinite; }
.timed-timer.danger { color: #e74c3c; animation: pulse 0.5s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
.timed-progress { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.timed-progress span { font-size: 14px; white-space: nowrap; }
.timed-prog-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; }
.timed-prog-fill { height: 100%; background: linear-gradient(90deg, #3498db, #2ecc71); border-radius: 3px; transition: width 0.3s; }
.timed-stats-mini { display: flex; gap: 20px; font-size: 15px; font-weight: 600; }
.timed-exit-btn {
  background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3);
  padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-left: 12px;
}
.timed-exit-btn:hover { background: rgba(255,255,255,0.25); }
.timed-q-card { transition: border 0.3s, box-shadow 0.3s; }
.timed-q-card.timed-correct { border-left: 4px solid #27ae60; }
.timed-q-card.timed-wrong { border-left: 4px solid #e74c3c; }
.timed-result {
  text-align: center; padding: 40px 20px;
}
.timed-result-score { font-size: 48px; font-weight: 700; margin: 16px 0; }
.timed-result-detail { font-size: 16px; color: #bbb; margin: 8px 0; }

/* ========== 题目卡片 ========== */
.question-card {
  background: #fff; border-radius: 12px; padding: 24px 28px; margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: all 0.3s;
  border-left: 4px solid #0f3460;
}
.question-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
.question-card.correct { border-left-color: #27ae60; background: #f0fff4; }
.question-card.wrong { border-left-color: #e74c3c; background: #fff5f5; }

.q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.q-number { font-size: 16px; font-weight: 700; color: #0f3460; }
.q-tags { display: flex; gap: 6px; }
.q-tag {
  font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
}
.tag-knowledge { background: #e8f4fd; color: #1976d2; }
.tag-difficulty-1 { background: #e8f5e9; color: #388e3c; }
.tag-difficulty-2 { background: #fff3e0; color: #f57c00; }
.tag-difficulty-3 { background: #fce4ec; color: #c62828; }
.tag-source { background: #f3e5f5; color: #7b1fa2; }

.q-body { font-size: 16px; line-height: 1.8; margin-bottom: 16px; color: #222; }

/* ========== 答案输入区 ========== */
.answer-area { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.answer-input {
  flex: 1; min-width: 200px; padding: 10px 14px; font-size: 16px;
  border: 2px solid #d0d0d0; border-radius: 8px; outline: none; transition: border-color 0.3s;
}
.answer-input:focus { border-color: #0f3460; }
.submit-btn {
  padding: 10px 24px; background: #0f3460; color: #fff; border: none; border-radius: 8px;
  font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.submit-btn:hover { background: #1a1a2e; transform: translateY(-1px); }
.submit-btn:disabled { background: #aaa; cursor: not-allowed; transform: none; }

.skip-btn {
  padding: 10px 18px; background: #95a5a6; color: #fff; border: none; border-radius: 8px;
  font-size: 15px; cursor: pointer; transition: all 0.2s;
}
.skip-btn:hover { background: #7f8c8d; }

/* ========== 解析区 ========== */
.analysis-area {
  margin-top: 14px; padding: 14px 16px; background: #f8f9fa; border-radius: 8px;
  border-left: 3px solid #27ae60; display: none; font-size: 14px; line-height: 1.7;
}
.analysis-area.show { display: block; }
.analysis-area .result-correct { color: #27ae60; font-weight: 700; font-size: 16px; }
.analysis-area .result-wrong { color: #e74c3c; font-weight: 700; font-size: 16px; }
.analysis-area .correct-answer { color: #0f3460; font-weight: 700; }

/* ========== 数学符号键盘 ========== */
.math-keyboard {
  background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 10px;
  margin-top: 8px; display: none; flex-wrap: wrap; gap: 4px; max-width: 500px;
}
.math-keyboard.show { display: flex; }
.math-key {
  padding: 6px 10px; border: 1px solid #d0d0d0; border-radius: 6px; background: #fafafa;
  cursor: pointer; font-size: 14px; transition: all 0.15s; user-select: none;
}
.math-key:hover { background: #e3f2fd; border-color: #1976d2; }
.math-key:active { transform: scale(0.95); }
.kb-toggle {
  padding: 6px 12px; border: 1px solid #d0d0d0; border-radius: 6px; background: #f5f5f5;
  cursor: pointer; font-size: 13px; color: #666;
}
.kb-toggle:hover { background: #e8f4fd; }
.kb-section-label { width: 100%; font-size: 12px; color: #999; padding: 4px 0 2px; font-weight: 600; }

/* ========== 统计面板 ========== */
.stats-panel {
  background: #fff; border-radius: 12px; padding: 20px 24px; margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.stat-item { text-align: center; }
.stat-value { font-size: 28px; font-weight: 700; }
.stat-label { font-size: 13px; color: #888; margin-top: 4px; }
.stat-correct .stat-value { color: #27ae60; }
.stat-wrong .stat-value { color: #e74c3c; }
.stat-rate .stat-value { color: #0f3460; }
.stat-total .stat-value { color: #f57c00; }

/* ========== 进度条 ========== */
.progress-bar {
  width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; margin-top: 12px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, #0f3460, #e94560); border-radius: 4px;
  transition: width 0.5s ease;
}

/* ========== 翻页控制 ========== */
.pagination {
  display: flex; justify-content: center; align-items: center; gap: 16px; margin: 24px 0;
}
.page-btn {
  padding: 8px 20px; border: 1px solid #d0d0d0; border-radius: 8px; background: #fff;
  cursor: pointer; font-size: 14px; transition: all 0.2s;
}
.page-btn:hover { border-color: #0f3460; color: #0f3460; }
.page-btn:disabled { color: #ccc; cursor: not-allowed; }
.page-info { font-size: 15px; color: #666; }

/* ========== 响应式 ========== */
@media (max-width: 600px) {
  .top-bar { padding: 12px 16px; }
  .top-bar h1 { font-size: 17px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .question-card { padding: 16px; }
  .filter-bar { gap: 8px; }
}
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="top-bar">
  <h1>🏆 高中数学联赛·<span>填空题刷题系统</span></h1>
  <div class="stats">已答 <b id="answeredCount">0</b> / <b id="totalCount">200</b> 题</div>
</div>

<div class="main-container">
  <!-- 统计面板 -->
  <div class="stats-panel" id="statsPanel" style="display:none;">
    <div class="stats-grid">
      <div class="stat-item stat-total"><div class="stat-value" id="statTotal">0</div><div class="stat-label">已答题数</div></div>
      <div class="stat-item stat-correct"><div class="stat-value" id="statCorrect">0</div><div class="stat-label">答对</div></div>
      <div class="stat-item stat-wrong"><div class="stat-value" id="statWrong">0</div><div class="stat-label">答错</div></div>
      <div class="stat-item stat-rate"><div class="stat-value" id="statRate">0%</div><div class="stat-label">正确率</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <!-- 筛选栏 -->
  <div class="filter-bar">
    <label>知识点：</label>
    <select id="filterKnowledge"><option value="">全部</option></select>
    <label>难度：</label>
    <select id="filterDifficulty">
      <option value="">全部</option>
      <option value="1">★ 入门</option>
      <option value="2">★★ 中等</option>
      <option value="3">★★★ 困难</option>
    </select>
    <label>年份：</label>
    <select id="filterYear"><option value="">全部</option></select>
    <label>来源：</label>
    <select id="filterSource"><option value="">全部</option></select>
    <button class="filter-btn" onclick="applyFilter()">筛选</button>
    <button onclick="resetFilter()">重置</button>
    <button class="timer-btn" onclick="startTimedPractice()">⏱ 计时练习</button>
  </div>

  <!-- 计时练习面板 -->
  <div class="timed-panel" id="timedPanel" style="display:none;">
    <div class="timed-header">
      <div class="timed-title">⏱ 计时练习模式</div>
      <div class="timed-timer" id="timedTimer">30:00</div>
    </div>
    <div class="timed-progress">
      <span id="timedProgress">1 / 8</span>
      <div class="timed-prog-bar"><div class="timed-prog-fill" id="timedProgFill" style="width:0%"></div></div>
    </div>
    <div class="timed-stats-mini">
      <span id="timedCorrect" style="color:#27ae60;">✓ 0</span>
      <span id="timedWrong" style="color:#e74c3c;">✗ 0</span>
      <span id="timedSkip" style="color:#999;">- 0</span>
    </div>
  </div>

  <!-- 题目区域 -->
  <div id="questionContainer"></div>

  <!-- 翻页 -->
  <div class="pagination">
    <button class="page-btn" id="prevBtn" onclick="changePage(-1)">上一页</button>
    <span class="page-info" id="pageInfo">第 1 题</span>
    <button class="page-btn" id="nextBtn" onclick="changePage(1)">下一页</button>
  </div>
</div>

<script>
// ===== 题库数据 =====
const QUESTIONS = [
  {id:1,question:'设集合X={1,2,⋯,20},A是X的子集,A的元素个数至少是2,且A的所有元素可排成连续的正整数,则这样的集合A的个数为 .',answer:'190',source:'2020高中数学联赛B卷（第01试）',knowledge:'集合',year:2020,difficulty:3},
  {id:2,question:'设集合A={1，2，3，…，99}，B={2x|x∈A},C={x|2x∈A}，则B∩C的元素个数为 .',answer:'24',source:'2018高中数学联赛A卷（第01试）',knowledge:'集合',year:2018,difficulty:3},
  {id:3,question:'设集合A={2，0，1，8}，B={2a|a∈A}则A∪B的所有元素之和是 .',answer:'31',source:'2018高中数学联赛B卷（第01试）',knowledge:'集合',year:2018,difficulty:3},
  {id:4,question:'集合M={1,2,3,4,5,6} 的所有子集的元素的和等于 .',answer:'672',source:'2021年广西预赛',knowledge:'集合',year:2021,difficulty:2},
  {id:5,question:'已知集合M={1,2,⋯,2020} ,对M 的任意非空子集A,λA 为集合A 中最大数与最小数的和.则所有这样的λA 的算术平均数为 .',answer:'2021',source:'2020年广西预赛',knowledge:'集合',year:2020,difficulty:2},
  {id:6,question:'设集合M={1,2,⋯,2020},A⊆M ,且对集合A 中的任意元素x,4x∉A. 则集合A 的元索个数的最大值为 .',answer:'1616',source:'2020年广西预赛',knowledge:'集合',year:2020,difficulty:2},
  {id:7,question:'一个正整数若能写成20a+8b+27c (a ,b ,c∈N) 形式,就称其为"好数".则集合{1,2,⋯,200} 中好数的个数为 .',answer:'153',source:'2020年浙江预赛',knowledge:'集合',year:2020,difficulty:2},
  {id:8,question:'设a,b,c>1,满足(a²b)logac=a⋅(ac)logab,则logc(ab)的值为 .',answer:'2',source:'2021年全国高中数学联赛B卷一试',knowledge:'函数',year:2021,difficulty:3},
  {id:9,question:'设a,b>0,满足:关于x的方程√(|x|)+√(|x+a|)=b恰有三个不同的实数解x₁,x₂,x₃,且x₁<x₂<x₃=b,则a+b的值为 .',answer:'144',source:'2020高中数学联赛A卷（第01试）',knowledge:'函数',year:2020,difficulty:3},
  {id:10,question:'若实数x满足log₂x=log₄(2x)+log₈(4x),则x= .',answer:'128',source:'2020高中数学联赛B卷（第01试）',knowledge:'函数',year:2020,difficulty:3},
  {id:11,question:'已知首项系数为1的五次多项式f(x)满足: f(n)=8n,n=1,2,⋯,5,则f(x)的一次项系数为 .',answer:'282',source:'2020高中数学联赛B卷（第01试）',knowledge:'函数',year:2020,difficulty:3},
  {id:12,question:'方程(1)/(x)+(1)/(y)=(1)/(2021) 的正整数解的组数为 .',answer:'9',source:'2021年江西预赛',knowledge:'函数',year:2021,difficulty:2},
  {id:13,question:'设对每个实数x,f(x) 的值皆取x²,6-x,2x+15 中的最小值,则f(x) 的最大值是 .',answer:'9',source:'2021年江西预赛',knowledge:'函数',year:2021,difficulty:2},
  {id:14,question:'已知函数f(x)=x³-ax²+(a²-2)x+1. 若存在m>0 ,使得f(m)≤0 ,则实数a 的最大值为 .',answer:'1',source:'2021年吉林预赛',knowledge:'函数',year:2021,difficulty:2},
  {id:15,question:'已知f(x) 和g(x) 是两个二次项系数均为1的二次函数.若g(6)=35 ,(f(-1))/(g(-1))=(f(1))/(g(1))=(21)/(20) ,则f(6)= .',answer:'35',source:'2021年福建预赛',knowledge:'函数',year:2021,difficulty:2},
  {id:16,question:'等差数列{aₙ}的公差d≠0,且a₂₀₂₁=a₂₀+a₂₁,则(a₁)/(d)的值为 .',answer:'1981',source:'2021年全国高中数学联赛B卷一试',knowledge:'数列',year:2021,difficulty:3},
  {id:17,question:'设等差数列{aₙ}的各项均为整数,首项a₁=2019,且对任意正整数n,总存在正整数m,使得a₁+a₂+⋯+aₙ=aₘ.这样的数列{aₙ}的个数为 .',answer:'5',source:'2019高中数学联赛B卷（第01试）',knowledge:'数列',year:2019,difficulty:3},
  {id:18,question:'设整数数列a₁,a₂,⋯,a₁₀满足a₁₀=3a₁,a₂+a₈=2a₅，且aᵢ+₁∈{1+aᵢ,2+aᵢ},i=1,2,⋯,9，则这样的数列的个数为 .',answer:'80',source:'2018高中数学联赛A卷（第01试）',knowledge:'数列',year:2018,difficulty:3},
  {id:19,question:'设两个严格递增的正整数数列{aₙ},{bₙ}满足:a₁₀=b₁₀<2017，对任意正整数n，有aₙ+₂=aₙ+₁+aₙ,bₙ+₁=2bₙ，则a₁+b₁的所有可能值为 .',answer:'13、20',source:'2017高中数学联赛A卷（第01试）',knowledge:'数列',year:2017,difficulty:3},
  {id:20,question:'设a₁,a₂,a₃,a₄是1，2，…，100中的4个互不相同的数，满足(a_{1}^²+a_{2}^²+a_{3}^²)(a_{2}^²+a_{3}^²+a_{4}^²)=(a₁a₂+a₂a₃+a₃a₄)²，则这样的有序数组(a₁,a₂,a₃,a₄)的个数为 .',answer:'40',source:'2016高中数学联赛（第01试）',knowledge:'数列',year:2016,difficulty:3},
  {id:21,question:'设aₙ=n(n+1)/2，则1/(a₁a₂)+1/(a₂a₃)+…+1/(a₉₉a₁₀₀)的值为______．',answer:'6',source:'2021年浙江预赛',knowledge:'数列',year:2021,difficulty:2},
  {id:22,question:'设数列aₙ₊₁=[aₙ/2]+[aₙ/3](n=1,2,…,7)，这里[x]表示不超过x的最大整数。若a₈=8，则正整数a₁有______种可能的取值情况。',answer:'7',source:'2021年浙江预赛',knowledge:'数列',year:2021,difficulty:2},
  {id:23,question:'已知数列{aₙ}满足a₁=1,a₂=4,a₃=10,对任意的n≥2有a²ₙ₊₁-2a²ₙ=aₙaₙ₊₂-2aₙ₋₁aₙ₊₁,则a₂₁的个位数字是 .',answer:'6',source:'2021年新疆预赛',knowledge:'数列',year:2021,difficulty:2},
  {id:24,question:'若正整数a、b、c满足2017≥10a≥100b≥1000c，则数组(a，b，c)的个数为 .',answer:'574',source:'2017高中数学联赛B卷（第01试）',knowledge:'不等式',year:2017,difficulty:3},
  {id:25,question:'已知四个整数a,b,c,d都是偶数，且0<a<b<c<d,d-a=90 ,若a,b,c成等差数列，b,c,d成等比数列，则a+b+c+d= .',answer:'194',source:'2021年吉林预赛',knowledge:'不等式',year:2021,difficulty:2},
  {id:26,question:'若正实数x,y满足x(x+2y)=9,则x⁵y的最大值为 .',answer:'54',source:'2021年福建预赛',knowledge:'不等式',year:2021,difficulty:2},
  {id:27,question:'已知xy+yz+zx=1 ,其中x,y,z均为正数,则√(3xy+1)+√(3yz+1)+√(3zx+1) 的整数部分为 .',answer:'4',source:'2021年广西预赛',knowledge:'不等式',year:2021,difficulty:2},

// Fisher-Yates 洗牌算法
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function populateFilters() {
  const knowledges = [...new Set(QUESTIONS.map(q => q.knowledge))];
  const years = [...new Set(QUESTIONS.map(q => q.year))].sort((a,b) => b-a);
  const sources = [...new Set(QUESTIONS.map(q => q.source))].sort();
  
  const kSel = document.getElementById('filterKnowledge');
  knowledges.forEach(k => { const o = document.createElement('option'); o.value = k; o.textContent = k; kSel.appendChild(o); });
  
  const ySel = document.getElementById('filterYear');
  years.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y + '年'; ySel.appendChild(o); });
  
  const sSel = document.getElementById('filterSource');
  sources.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sSel.appendChild(o); });
}

  filteredQuestions = QUESTIONS.filter(q => {

  const input = document.getElementById('answerInput');

}

// ===== 答案判定系统（数值兼容性判断）=====
function checkAnswer(userAns, correctAns) {
  // 1. 精确字符串匹配（去除首尾空格、统一全角半角）
  const u = normalizeString(userAns);
  const c = normalizeString(correctAns);
  if (u === c) return true;
  
  // 2. 数值等价判断
  // 尝试将两个答案都转为数值
  const uNum = tryParseNumber(u);
  const cNum = tryParseNumber(c);
  if (uNum !== null && cNum !== null && Math.abs(uNum - cNum) < 1e-9) return true;
  
  // 3. 分数等价判断：如 "2/9" 和 "0.222..." 等
  const uFrac = tryParseFraction(u);
  const cFrac = tryParseFraction(c);
  if (uFrac !== null && cFrac !== null && Math.abs(uFrac - cFrac) < 1e-9) return true;
  if (uNum !== null && cFrac !== null && Math.abs(uNum - cFrac) < 1e-9) return true;
  if (uFrac !== null && cNum !== null && Math.abs(uFrac - cNum) < 1e-9) return true;
  
  // 4. 根号等价：如 "√2" ≈ "1.414" 
  const uRad = tryParseRadical(u);
  const cRad = tryParseRadical(c);
  if (uRad !== null && cRad !== null && Math.abs(uRad - cRad) < 1e-9) return true;
  if (uNum !== null && cRad !== null && Math.abs(uNum - cRad) < 1e-6) return true;
  if (uRad !== null && cNum !== null && Math.abs(uRad - cNum) < 1e-6) return true;
  
  // 5. 含π的等价：如 "2π" ≈ "6.283"
  const uPi = tryParsePiExpression(u);
  const cPi = tryParsePiExpression(c);
  if (uPi !== null && cPi !== null && Math.abs(uPi - cPi) < 1e-6) return true;
  if (uNum !== null && cPi !== null && Math.abs(uNum - cPi) < 1e-4) return true;
  if (uPi !== null && cNum !== null && Math.abs(uPi - cNum) < 1e-4) return true;
  
  // 6. 幂次等价：如 "2^10" = "1024", "2¹⁰" = "1024"
  const uPow = tryParsePower(u);
  const cPow = tryParsePower(c);
  if (uPow !== null && cPow !== null && Math.abs(uPow - cPow) < 1e-9) return true;
  if (uNum !== null && cPow !== null && Math.abs(uNum - cPow) < 1e-6) return true;
  if (uPow !== null && cNum !== null && Math.abs(uPow - cNum) < 1e-6) return true;
  
  return false;
}

// 标准化字符串：全角→半角，去空格
function normalizeString(s) {
  return s.replace(/[\uff10-\uff19]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
          .replace(/．/g, '.').replace(/，/g, ',').replace(/（/g, '(').replace(/）/g, ')')
          .replace(/\s+/g, '').trim();
}

// 尝试解析数值
function tryParseNumber(s) {
  // 去除末尾的句号（OCR常见错误）
  const clean = s.replace(/\.+$/, '');
  const n = Number(clean);
  return isNaN(n) ? null : n;
}

// 尝试解析分数
function tryParseFraction(s) {
  // 匹配 "a/b" 格式
  const m = s.match(/^(-?\d+)\/(\d+)$/);
  if (m) {
    const num = parseInt(m[1]), den = parseInt(m[2]);
    if (den !== 0) return num / den;
  }
  return null;
}

// 尝试解析根号表达式
function tryParseRadical(s) {
  // √2, ∛27, √(3) 等
  const m1 = s.match(/^√(\d+)$/);
  if (m1) return Math.sqrt(parseInt(m1[1]));
  const m2 = s.match(/^∛(\d+)$/);
  if (m2) return Math.cbrt(parseInt(m2[1]));
  // √(a/b) 形式
  const m3 = s.match(/^√\((\d+)\/(\d+)\)$/);
  if (m3) return Math.sqrt(parseInt(m3[1]) / parseInt(m3[2]));
  return null;
}

// 尝试解析含π的表达式
function tryParsePiExpression(s) {
  // 2π, π/3, -π/2 等
  const m1 = s.match(/^(-?\d*)π$/);
  if (m1) { const coeff = m1[1] === '' || m1[1] === '-' ? (m1[1] === '-' ? -1 : 1) : parseInt(m1[1]); return coeff * Math.PI; }
  const m2 = s.match(/^(-?\d*)π\/(\d+)$/);
  if (m2) { const coeff = m2[1] === '' || m2[1] === '-' ? (m2[1] === '-' ? -1 : 1) : parseInt(m2[1]); return coeff * Math.PI / parseInt(m2[2]); }
  return null;
}

// 尝试解析幂次表达式
function tryParsePower(s) {
  // a^b 或 aⁿ (Unicode上标)
  const m1 = s.match(/^(-?\d+)\^(\d+)$/);
  if (m1) return Math.pow(parseInt(m1[1]), parseInt(m1[2]));
  // Unicode上标转换
  const supMap = {'⁰':0,'¹':1,'²':2,'³':3,'⁴':4,'⁵':5,'⁶':6,'⁷':7,'⁸':8,'⁹':9,'ⁿ':null};
  const m2 = s.match(/^(-?\d+)([⁰¹²³⁴⁵⁶⁷⁸⁹]+)$/);
  if (m2) {
    let exp = 0;
    for (const ch of m2[2]) {
      if (supMap[ch] === null) return null;
      exp = exp * 10 + supMap[ch];
    }
    return Math.pow(parseInt(m2[1]), exp);
  }
  return null;
}

    }
  }
  
  // 从100道题中随机选8道：确保各模块覆盖+难度梯度均匀
  timedQuestions = selectBalancedQuestions(8);
  timedIndex = 0;

  timedRemaining = 30 * 60;
  timedMode = true;
  timedStartTime = Date.now();

    }
  }, 1000);
}

function selectBalancedQuestions(count) {
  // 难度梯度：2道基础(1) + 4道中等(2) + 2道困难(3)
  const diffTargets = {1: 2, 2: 4, 3: 2};
  
  // 知识点覆盖：尽量选不同知识点
  const allKnowledges = [...new Set(QUESTIONS.map(q => q.knowledge))];
  const knowledgeTarget = Math.min(3, Math.ceil(count / allKnowledges.length)); // 每个知识点最多选3道
  
  let selected = [];
  let selectedIds = new Set();
  let knowledgeCount = {};
  
  // 按难度分层选择
  for (const [diff, need] of Object.entries(diffTargets)) {
    const pool = QUESTIONS.filter(q => q.difficulty == diff && !selectedIds.has(q.id));
    // 打乱
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    
    let picked = 0;
    for (const q of shuffled) {
      if (picked >= need) break;
      const kc = knowledgeCount[q.knowledge] || 0;
      if (kc >= knowledgeTarget) continue; // 同一知识点不要太多
      
      selected.push(q);
      selectedIds.add(q.id);
      knowledgeCount[q.knowledge] = kc + 1;
      picked++;
    }
    
    // 如果该难度层不够，从其他难度补充
    if (picked < need) {
      const extraPool = QUESTIONS.filter(q => !selectedIds.has(q.id));
      const extraShuffled = [...extraPool].sort(() => Math.random() - 0.5);
      for (const q of extraShuffled) {
        if (picked >= need) break;
        const kc = knowledgeCount[q.knowledge] || 0;
        if (kc >= knowledgeTarget + 1) continue;
        selected.push(q);
        selectedIds.add(q.id);
        knowledgeCount[q.knowledge] = kc + 1;
        picked++;
      }
    }
  }
  
  // 如果还不够count道，从剩余题目中补充
  if (selected.length < count) {
    const extraPool = QUESTIONS.filter(q => !selectedIds.has(q.id));
    const extraShuffled = [...extraPool].sort(() => Math.random() - 0.5);
    for (const q of extraShuffled) {
      if (selected.length >= count) break;
      selected.push(q);
      selectedIds.add(q.id);
    }
  }
  
  // 打乱最终顺序
  return selected.sort(() => Math.random() - 0.5);
}

function updateTimedTimer() {
  const mins = Math.floor(timedRemaining / 60);
  const secs = timedRemaining % 60;
  const timerEl = document.getElementById('timedTimer');
  timerEl.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  
  // 颜色变化
  timerEl.classList.remove('warning', 'danger');
  if (timedRemaining <= 60) timerEl.classList.add('danger');
  else if (timedRemaining <= 300) timerEl.classList.add('warning');
}

    const isCorrect = timedResults[i] === 'correct';
    const userAns = timedAnswers[i] || '';
    
    html += `
      <div class="question-card timed-q-card ${answered ? (isCorrect ? 'timed-correct' : 'timed-wrong') : ''}">
        <div class="q-header">
          <span class="q-number">第 ${i + 1} 题</span>
          <div class="q-tags">
            <span class="q-tag tag-knowledge">${q.knowledge}</span>
            <span class="q-tag tag-difficulty-${q.difficulty}">${diffLabels[q.difficulty]}</span>
          </div>
        </div>
        <div class="q-text">${q.question}</div>
        <div class="answer-area">
          <input type="text" class="answer-input timed-input" data-idx="${i}" placeholder="输入答案..."
            value="${userAns}" ${answered ? 'disabled' : ''}
            onkeydown="if(event.key==='Enter')submitTimedAnswer(${i})" />
          ${!answered ? `<button class="submit-btn" onclick="submitTimedAnswer(${i})">提交</button>
          <button class="skip-btn" onclick="skipTimedQuestion(${i})">跳过</button>` : ''}
          <button class="kb-toggle" onclick="toggleTimedKb(${i})">⌨ 符号</button>
        </div>
        <div class="math-keyboard" id="timedKb${i}" style="display:none;">
          <div class="kb-section-label">常用运算</div>
          <span class="math-key" onclick="insertTimedSymbol(${i},'+')">+</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'-')">-</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'×')">×</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'÷')">÷</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'=')">=</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'≠')">≠</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'≤')">≤</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'≥')">≥</span>
          <div class="kb-section-label">上下标与根号</div>
          <span class="math-key" onclick="insertTimedSymbol(${i},'²')">²</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'³')">³</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'ⁿ')">ⁿ</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'√')">√</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∛')">∛</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'^')">^</span>
          <div class="kb-section-label">希腊字母</div>
          <span class="math-key" onclick="insertTimedSymbol(${i},'α')">α</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'β')">β</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'θ')">θ</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'π')">π</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'φ')">φ</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'ω')">ω</span>
          <div class="kb-section-label">集合与逻辑</div>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∈')">∈</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∪')">∪</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∩')">∩</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'⊆')">⊆</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∅')">∅</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∀')">∀</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∃')">∃</span>
          <div class="kb-section-label">其他</div>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∞')">∞</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∠')">∠</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'⊥')">⊥</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∥')">∥</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'·')">·</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'|')">|</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'!')">!</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'()')">()</span>
        </div>
        <div class="analysis-area ${answered ? 'show' : ''}">
          ${answered ? `
            <div class="${isCorrect ? 'result-correct' : 'result-wrong'}">
              ${isCorrect ? '✅ 正确' : '❌ 错误'}
            </div>
            <div style="margin-top:6px;font-size:13px;">正确答案：<span class="correct-answer">${q.answer}</span>
            ${!isCorrect ? ` | 你的答案：${userAns || '（跳过）'}` : ''}</div>
          ` : ''}
        </div>
      </div>
    `;
  }
  
  // 底部操作栏
  html += `
    <div style="display:flex;gap:12px;margin-top:20px;justify-content:center;position:sticky;bottom:10px;z-index:10;background:#f5f6fa;padding:12px 0;">
      <button class="timer-btn" onclick="finishTimedPractice()" style="font-size:16px;padding:12px 32px;">
        📊 交卷（已答 ${answeredCount}/${timedQuestions.length}）
      </button>
      <button class="filter-btn" onclick="exitTimedPractice()" style="font-size:14px;padding:10px 20px;">← 返回正常练习</button>
    </div>
  `;
  
  container.innerHTML = html;
}

function insertTimedSymbol(idx, sym) {
  const input = document.querySelector(`.timed-input[data-idx="${idx}"]`);
  if (!input || input.disabled) return;
  const start = input.selectionStart;
  const end = input.selectionEnd;
  const val = input.value;
  input.value = val.substring(0, start) + sym + val.substring(end);
  input.selectionStart = input.selectionEnd = start + sym.length;
  input.focus();
}

function toggleTimedKb(idx) {
  const kb = document.getElementById('timedKb' + idx);
  if (!kb) return;
  // 先关闭其他所有键盘
  document.querySelectorAll('.math-keyboard[id^="timedKb"]').forEach(el => {
    if (el !== kb) el.style.display = 'none';
  });
  kb.style.display = kb.style.display === 'none' ? 'flex' : 'none';
}

function submitTimedAnswer(idx) {
  const input = document.querySelector(`.timed-input[data-idx="${idx}"]`);
  if (!input) return;
  const userAns = input.value.trim();
  if (!userAns) { alert('请输入答案'); return; }
  
  const q = timedQuestions[idx];
  timedAnswers[idx] = userAns;
  timedResults[idx] = checkAnswer(userAns, q.answer) ? 'correct' : 'wrong';
  
  renderTimedQuestion();
  
  // 滚动到下一道未答的题
  setTimeout(() => {
    const nextInput = document.querySelector(`.timed-input:not([disabled])`);
    if (nextInput) nextInput.focus();
  }, 100);
}

function skipTimedQuestion(idx) {
  timedAnswers[idx] = '';
  timedResults[idx] = 'wrong';
  renderTimedQuestion();
}

function finishTimedPractice() {
  if (timedTimerId) clearInterval(timedTimerId);
  
  const totalQ = timedQuestions.length;
  const answered = Object.keys(timedResults).length;
  const correct = Object.values(timedResults).filter(r => r === 'correct').length;
  const wrong = answered - correct;
  const skip = totalQ - answered;
  const timeUsed = Math.round((Date.now() - timedStartTime) / 1000);
  const mins = Math.floor(timeUsed / 60);
  const secs = timeUsed % 60;
  
  // 评分：每对一题得4分，共32分
  const score = correct * 4;
  const maxScore = totalQ * 4;
  
  // 评级
  let grade = '', gradeColor = '';
  if (score >= 28) { grade = '🏆 优秀'; gradeColor = '#f1c40f'; }
  else if (score >= 24) { grade = '🥇 良好'; gradeColor = '#2ecc71'; }
  else if (score >= 16) { grade = '📝 中等'; gradeColor = '#3498db'; }
  else { grade = '💪 需加油'; gradeColor = '#e74c3c'; }
  
  const container = document.getElementById('questionContainer');
  container.innerHTML = `
    <div class="question-card timed-result">
      <div style="font-size:24px;font-weight:700;margin-bottom:8px;">⏱ 练习结束</div>
      <div class="timed-result-score" style="color:${gradeColor};">${score}/${maxScore}</div>
      <div style="font-size:20px;color:${gradeColor};margin-bottom:20px;">${grade}</div>
      <div class="timed-result-detail">✅ 答对：${correct} 题</div>
      <div class="timed-result-detail">❌ 答错：${wrong} 题</div>
      <div class="timed-result-detail">⏭ 跳过：${skip} 题</div>
      <div class="timed-result-detail">⏱ 用时：${mins}分${secs}秒</div>
      <div style="margin-top:24px;padding:16px;background:#f8f9fa;border-radius:10px;text-align:left;">
        <div style="font-weight:700;margin-bottom:10px;">📊 逐题回顾</div>
        ${timedQuestions.map((q, i) => {
          const r = timedResults[i];
          const icon = r === 'correct' ? '✅' : '❌';
          const userA = timedAnswers[i] || '（跳过）';
          return `<div style="padding:6px 0;border-bottom:1px solid #eee;font-size:13px;">
            ${icon} 第${i+1}题 [${q.knowledge}] 你的答案：${userA} ${r !== 'correct' ? '→ 正确：' + q.answer : ''}
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:12px;margin-top:24px;justify-content:center;">
        <button class="timer-btn" onclick="startTimedPractice()">再来一轮</button>
        <button class="filter-btn" onclick="exitTimedPractice()">返回自由练习</button>
      </div>
    </div>
  `;
}

function exitTimedPractice() {
  if (timedTimerId) clearInterval(timedTimerId);
  timedMode = false;
  
  // 恢复UI
  document.getElementById('timedPanel').style.display = 'none';
  document.querySelector('.filter-bar').style.display = 'flex';
  
  // 恢复正常模式
  filteredQuestions = [...QUESTIONS];
  currentIndex = 0;
  renderQuestion();
  updateStats();
}

// 启动
window.onload = init;
</script>
</body>
</html>
