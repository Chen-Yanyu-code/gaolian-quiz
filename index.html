  {id:201,question:'设数列a_n+1=((a_n)/(2))+((a_n)/(3)),n=1,2,⋯,7 ,这里[x]表示不超过x 的最大整数。若a_8=8 ,则正整数a_1 有种可能的取值情况。',answer:'7',source:'2021年浙江预赛',knowledge:'数列',year:2021,difficulty:3,explanation:'由 a_8=8 , 可得 a_7=10 或 11 , 可得 a_6=12 或 13 或 14 ; 可得 a_5=15 或 16 或 17 可得 a_4=18 或 19 或 20 或 21 ; 可得 a_3=22 或 23 或 24 或 25 或26， 可得 a_2=27 或 28 或 29 或 30 或 31 或 32 ; 可得 a_1=33 或 34 或 35 或 36 或 37 或 38 ,39，共7种.'},
  {id:202,question:'已知⊙O:x^2+y^2=5 与抛物线C :y^2=2px(p&gt;0) 交于点A(x_0,2),AB 为⊙O 的直径,过点B 的直线与抛物线C 交于两点D 、E.则AD与AE的斜率之积为',answer:'2',source:'2020年重庆预赛',knowledge:'解析几何',year:2020,difficulty:3,explanation:'易知，点A(1,2),B(-1,-2) . 设D(x_1,y_1),E(x_2,y_2) . 由B、D、E三点共线⇒(y_1+2)/(x_1+1)=(y_2+2)/(x_2+1) ⇒y_1y_2+2(y_1+y_2)=4 ⇒k_ADk_AE=(y_1-2)/(x_1-1)⋅(y_2-2)/(x_2-1) =(16)/(y_1y_2+2(y_1+y_2)+4)=2.'},
  {id:203,question:'如图，在长方体ABCD-A_1B_1C_1D_1 中，已知AB=BC=6,AA_1=2 ,点M、N分别在 棱DA、DC上，二面角D_1-MN-D 的大小为45^° .若三棱锥D_1-DMN 的体积为(16sqrt(3))/(9) ,则三棱锥D_1-DMN 外接球的表面积为',answer:'(76)/(3)π',source:'2021年福建预赛',knowledge:'立体几何',year:2021,difficulty:3,explanation:'如图，作DE⊥MN 于E，连接D_1E. 则由正方体的性质知,MN⊥D_1D ，于是MN⊥ 平面D_1DE ,MN⊥D_1E . 所以,∠D_1ED 为二面角D_1-MN-D 的平面角,∠D_1ED=45^° ,DE=D_1D=2 . V_D_1-DMN=(1)/(3)⋅D_1D⋅S_△DMN=(1)/(3)⋅2⋅((1)/(2)⋅2⋅MN)=(16sqrt(3))/(9) , 因此,MN=(8sqrt(3))/(3) . 设三棱雉D_1-DMN 外接球半径为R，则由DM,DN,DD_1 两两互相垂直，得2R=sqrt(DD12+DM^2+DN^2)=sqrt(DD12+MN^2)=sqrt(2^2+((8sqrt(3))/(3))^2)=sqrt((76)/(3)) . 因此，三棱锥D_1-DMN 外接球的表面积为4πR^2=(76π)/(3) .'},
  {id:204,question:'已知函数f(x)=x^3-ax^2+(a^2-2)x+1. 若存在m&gt;0 ,使得f(m)≤0 ,则实数a 的最大值为',answer:'1',source:'2021年吉林预赛',knowledge:'函数',year:2021,difficulty:3,explanation:'a=1时，f（1）=0，符合题设； a&gt;1时，f(x)=(x-a)^2x+ax^2-2x+1≥ax^2-2x+1&gt;x^2-2x+1≥0 ，不符合题设. 综上，实数a的最大值为1.'},
  {id:205,question:'已知离心率为(sqrt(6))/(2) 的双曲线C:(x^2)/(a^2)-(y^2)/(b^2)=1(a&gt;0,b&gt;0) 的左、右焦点分别为F_1 、F_2,P 为双曲线上一点，R、r分别为△PF_1F_2 的外接圆、内切圆半径.若∠F_1PF_2=60^° ,则(R)/(r)=',answer:'2sqrt(2)+2',source:'2021年福建预赛',knowledge:'解析几何',year:2021,difficulty:3,explanation:'解法一：由题意可得c=(sqrt(6))/(2)a ， 在△F_1PF_2 中，由正弦定理可得：2R=(2c)/(sin∠F_1PF_2)=(sqrt(6)a)/(sin60^°)=2sqrt(2)a, R=sqrt(2)a ， 如图，不妨设点P 在双曲线右支上，△PF_1F_2 的内切圆I 切x 轴于点D ,则由双曲线性质知,D 为双曲线的右顶点,(F_1D)=c+a,(F_2D)=c-a. 则tan∠IF_1F_2=(ID)/(F_1D)=(r)/(c+a),tan∠IF_2F_1=(ID)/(F_2D)=(r)/(c-a) . 又∠IF_1F_2+∠IF_2F_1=60^° ， 因此,tan(∠IF_1F_2+∠IF_2F_1)=((r)/(c+a)+(r)/(c-a))/(1-(r)/(c+a)⋅(r)/(c-a))==(2cr)/(c+ac-a)=sqrt(3) . 将c=(sqrt(6))/(2)a 代入上式，并整理得2r^2+2sqrt(2)ar-a^2=0. 结合r&gt;0 ,解得r=(2-sqrt(2))/(2)a=(1)/(2+sqrt(2))a . 所以,(R)/(r)=sqrt(2)(2+sqrt(2))=2sqrt(2)+2 . 解法二:依题意,c=(sqrt(6))/(2)a . 记(PF_1)=r_1,(PF_2)=r_2 ,不妨设点P 在双曲线右支上,则r_1-r_2=2a . 在△PF_1F_2 中，由正弦定理得： 2R=(r_1)/(sin∠PF_2F_1)=(r_2)/(sin∠PF_1F_2)=(2c)/(sin∠F_1PF_2)=(4sqrt(3))/(3)c=2sqrt(2)a 所以,R=sqrt(2)a ,且： 2a=r_1-r_2=2sqrt(2)a⋅(sin∠PF_2F_1-sin∠PF_1F_2) =2sqrt(2)a⋅(sin(120^°-∠PF_1F_2)-sin∠PF_1F_2) =2sqrt(2)a⋅((sqrt(3))/(2)cos∠PF_1F_2+(1)/(2)sin∠PF_1F_2-sin∠PF_1F_2) =2sqrt(2)a⋅((sqrt(3))/(2)cos∠PF_1F_2-(1)/(2)sin∠PF_1F_2) =2sqrt(2)a⋅cos(∠PF_1F_2+30^°). 因此,cos(∠PF_1F_2+30^°)=(sqrt(2))/(2) . 又0^°&lt;∠PF_1F_2&lt;90^°, 30^°&lt;∠PF_1F_2+30^°&lt;120^° 所以,∠PF_1F_2+30^°=45^°,∠PF_1F_2=15^° , r_2=2sqrt(2)a⋅sin∠PF_1F_2=2sqrt(2)a⋅sin15^°=2sqrt(2)a⋅(sqrt(6)-sqrt(2))/(4)=(sqrt(3)-1)a,r_1=(sqrt(3)+1)a △PF_1F_2 周长l=r_1+r_2+2c=(sqrt(3)+1)a+(sqrt(3)-1)a+sqrt(6)a=(2sqrt(3)+sqrt(6))a , △PF_1F_2 的面积S=(1)/(2)r_1r_2sin60^°=(sqrt(3))/(2)a^2 .由S=r⋅(l)/(2) ,得r=(sqrt(3)a)/(2sqrt(3)+sqrt(6))=(1)/(2+sqrt(2))a. 所以,(R)/(r)=sqrt(2)(2+sqrt(2))=2sqrt(2)+2 .'},
  {id:206,question:'设数列{a_n} 的前两项分别为a_1=2 ,a_2=4. 设b_n=a_n+1-a_n. 若数列{b_n} 是公差为1的等差数列,则a_2020=',answer:'2041211',source:'2020年广西预赛',knowledge:'数列',year:2020,difficulty:3,explanation:'易知,b_1=a_2-a_1=2. 由{b_n} 的公差为1知 b_n=n+1 故a_2020=a_1+SUM_{i=1}^{2019}(b_i) =2+2+3+⋯+2020 =2041211.'},
  {id:207,question:'给定实数集合A,B,定义运算A⊗B={x∣x=ab+a+b,a∈A,b∈B} .设A={0,2,4,⋯,18},B={98,99,100} ,则A⊗B 中的所有元素之和为',answer:'29970',source:'2021年浙江预赛',knowledge:'集合',year:2021,difficulty:3,explanation:'由 x=(a+1)(b+1)-1 , 则可知所有元素之和为 (1+3+⋯+19)×300-3×10=29970 .'},
  {id:208,question:'在平面直角坐标系xOy中,圆Ω经过点(0,0), (2,4) , (3,3) ,则圆Ω上的点到原点的距离的最大值为',answer:'2sqrt(5)',source:'2020高中数学联赛B卷（第01试）',knowledge:'解析几何',year:2020,difficulty:3,explanation:'记A(2,4),B(3,3),圆Ω经过点O,A,B.注意到∠OBA=90°(直线OB与AB的斜率分别为1和-1),故OA为圆Ω的直径.从而圆Ω上的点到原点O的距离的最大值为|OA|=2sqrt(5).'},
  {id:209,question:'设k 为方程|x|^(1)/(4)+|x|^(1)/(2)-cosx=0 的实根的个数，则k=',answer:'2',source:'2021年广西预赛',knowledge:'函数',year:2021,difficulty:3,explanation:'令f(x)=|x|^(1)/(4)+|x|^(1)/(2)-cosx ,则f(0)=-1 .当x≥1 时,f(x)≥1.f(x) 在[0,1]单调，f(0)f(1)&lt;0 . 故f(x) 在[0,1]内有唯一实根，从而f(x) 在[0,+∞) 内有唯一实根. 于是，由f(x) 为偶函数可得原方程有且只有2个实根.'},
  {id:210,question:'如图,边长为2的正方形ABCD中,E 是AB的中点,现将△AED,△BEC 沿EC,ED折起,使EA,EB重合,组成一个四面体,则此四面体的体积是',answer:'(sqrt(3))/(3)',source:'2021年江西预赛',knowledge:'立体几何',year:2021,difficulty:3,explanation:'设CD的中点为F,△ACD 为正三角形,其边长为2,因AF⊥CD,EF⊥CD , 于是CD垂直于面AEF,AF=sqrt(3),AE=1,EF=2 ,则AE^2+AF^2=EF^2. 所以AE⊥AF,S_ΔAFF=(1)/(2)AE⋅AF=(sqrt(3))/(2) , 从而V= (1)/(3)CD⋅S_△AEF=(sqrt(3))/(3).'},
  {id:211,question:'已知实数m 满足当关于x 的实系数一元二次方程ax^2+bx+c=0 有实根时，(a-b)^2+(b-c)^2+(c-a)^2⩾ma^2 总成立.则m 的最大值为',answer:'(9)/(8)',source:'2020年福建预赛',knowledge:'不等式',year:2020,difficulty:3,explanation:'设μ=((a-b)^2+(b-c)^2+(c-a)^2)/(a^2), 其中,a、b、c为实数,a≠0. 当方程ax^2+bx+c=0 有实根时,设其两个根为x_1,x_2 . 由韦达定理知 x_1+x_2=-(b)/(a),x_1x_2=(c)/(a). 则μ=((a-b)^2+(b-c)^2+(c-a)^2)/(a^2) =(1-(b)/(a))^2+((b)/(a)-(c)/(a))^2+((c)/(a)-1)^2; =(1+x_1+x_2)^2+(-x_1-x_2-x_1x_2)^2+(x_1x_2-1)^2; =2(x12+x_1+1)(x22+x_2+1); ⩾2×(3)/(4)×(3)/(4)=(9)/(8), 当且仅当x_1=x_2=-(1)/(2) ,即a=b=4c≠0 时, 上式等号成立. 故μ 的最小值为(9)/(8) . 从而,m 的最大值为(9)/(8) .'},
  {id:212,question:'已知f(x)=(1)/(x^2)+(1)/(x^4) ,若f(a-2)&lt;f(2a+1) 成立，则a 的取值范围为',answer:'(-3,-(1)/(2))∪(-(1)/(2),(1)/(3))',source:'2021年福建预赛',knowledge:'函数',year:2021,difficulty:3,explanation:'易知f(x)=(1)/(x^2)+(1)/(x^4) 是定义在(-∞,0)∪(0,+∞) 上的偶函数，且在(0,+∞) 递减. 所以|a-2|&gt;|2a+1|&gt;0 . 解得,-3&lt;a&lt;(1)/(3) ,且a≠-(1)/(2) . 所以，a 的取值范围为(-3,-(1)/(2))∪(-(1)/(2),(1)/(3)) .'},
  {id:213,question:'在等比数列{a_n}中, a_9=13,a_3=1,则log_a_113的值为',answer:'(1)/(3)',source:'2020高中数学联赛A卷（第01试）',knowledge:'数列',year:2020,difficulty:3,explanation:'由等比数列的性质知(a_1)/(a_9)=((a_9)/(a_13))^2, a_1=(a93)/(a132)=13^3.所以log_a_113=(1)/(3).'},
  {id:214,question:'当(π)/(4)≤x≤(π)/(2)时,y=sin^2x+sqrt(3)sinxcosx的取值范围是',answer:'(1,(3)/(2))',source:'2021年全国高中数学联赛B卷一试',knowledge:'三角函数',year:2021,difficulty:4,explanation:'y=sin^2x+sqrt(3)sinxcosx=(1-cos2x)/(2)+(sqrt(3))/(2)sin2x=sin(2x-(π)/(6))+(1)/(2). 当(π)/(4)≤x≤(π)/(2)时,(π)/(3)≤2x-(π)/(6)≤(5π)/(6),故sin(2x-(π)/(6))的取值范围是((1)/(2),1). 所以y的取值范围是(1,(3)/(2)).'},
  {id:215,question:'已知xy+yz+zx=1 ,其中x,y,z均为正数,则sqrt(3xy+1)+sqrt(3yz+1)+sqrt(3zx+1) 的整数部分为',answer:'4',source:'2021年广西预赛',knowledge:'不等式',year:2021,difficulty:3,explanation:'取x=y=z=(sqrt(3))/(3) 易得结果，一般的证明可考虑使用幂函平均不等式.'},
  {id:216,question:'已知点H 是△ABC 的垂心，且满足HA+2HB+6HC=0 ,则角B=',answer:'(π)/(3)',source:'2021年重庆预赛',knowledge:'平面向量',year:2021,difficulty:3,explanation:'由于点H 是△ABC 的垂心，则： tanA⋅HA+tanB⋅HB+tanC⋅HC=0 ,所以tanA=(tanB)/(2)=(tanC)/(6) . 又tanA⋅tanB⋅tanC=tanA+tanB+tanC ,所以tanB=sqrt(3) ,即B=(π)/(3) .'},
  {id:217,question:'若数列{a_n} 满足a_n=[(2+sqrt(3))^2^n](n∈Z_+) ,则a_2020 的末尾两位数字为',answer:'53',source:'2020年四川预赛',knowledge:'数列',year:2020,difficulty:3,explanation:'记b_n=(2+sqrt(3))^n+(2-sqrt(3))^n. 则 b_1=4,b_2=14 , b_n+2=4b_n+1-b_n(n∈Z_+) . 考虑{b_n( mod 100)} ,它们分别为: 04,14,52,94,24,02,84,34,52,74,44,02,64,54,52,54,64,02,44,74,52,34,84,02,24,94,52,14,04,02,04,14,…, 是以30为周期的模周期数列. 又2^2020≡2^404=2^4×2^400≡2^4×2^80≡2^4×2^16=2^5×2^15=2×2^3 ≡16( mod 30) , 则b_2020 的最后两位数为54. 因为(2-sqrt(3))^n∈(0,1) ,所以,a_2020 的末尾两位数字为53.'},
  {id:218,question:'在△ABC中,AB=1,AC=2,B-C=(2π)/(3),则△ABC的面积为',answer:'(3sqrt(3))/(14)',source:'2021年全国高中数学联赛A卷一试',knowledge:'三角函数',year:2021,difficulty:5,explanation:'由正弦定理可得：(sinB)/(sinC)=(AC)/(AB)=2，又B-C=(2π)/(3)， 故：2sinC=sinB=sin(C+(2)/(3)π)=-(1)/(2)sinC+(sqrt(3))/(2)cosC， 即(5)/(2)sinC=(sqrt(3))/(2)cosC,所以tanC=(sqrt(3))/(5). 记△ABC的面积为S.注意到A=π-B-C=(π)/(3)-2C,故S=(1)/(2)AB⋅AC⋅sinA=sinA=(sqrt(3))/(2)cos2C-(1)/(2)sin2C. 由tanC=(sqrt(3))/(5)知cos2C=(1-tan^2C)/(1+tan^2C)=(11)/(14),sin2C=(2tanC)/(1+tan^2C)=(5sqrt(3))/(14),从而S=(sqrt(3))/(2)⋅(11)/(14)-(1)/(2)⋅(5sqrt(3))/(14)=(3sqrt(3))/(14)'},
  {id:219,question:'将正整数中所有数码不超过5的数从小到大排成一列，则第2021个数是',answer:'13205',source:'2021年新疆预赛',knowledge:'组合',year:2021,difficulty:3,explanation:'方法一：所有数码不超过5的数有5个,两位正整数有5×6=30 个,三位正整数有5×6^2=180 个，四位正整数有5×6^3=1080 个，共有1295个: 万位数为1,千位为0,共216个； 万位数为1,千位为1,共216个; 万位数为1，千位为2，共216个;共1943个， 万位数为1,千位为3，百位是0,1各36个，共72个，一共1943+72=2015个，还差6个，百位是2，个位取0,1,2,3,4,5,所以第2021个数是13205. 方法二:数码不超过5的数可以与一个六进制数建立一一对应关系,2021=1×6^4+3×6^3+2×6^2+0× 6+5. 利用除6取余法可得,即(2021)_10=(13205)_6 , 所以答案是:13205.'},
  {id:220,question:'等差数列(a_n)的公差d≠0,且a_2021=a_20+a_21,则(a_1)/(d)的值为',answer:'1981',source:'2021年全国高中数学联赛B卷一试',knowledge:'数列',year:2021,difficulty:4,explanation:'由条件知a_1+2020d=a_1+19d+a_1+20d,又d≠0,故(a_1)/(d)=1981.'},
  {id:221,question:'sin^2100^°-sin50^°sin70^°=',answer:'(1)/(4)',source:'2021年新疆预赛',knowledge:'三角函数',year:2021,difficulty:3,explanation:'方法一:原式=cos^210^°-sin50^°sin70^°=(1)/(2)+(1)/(2)cos20^°+(1)/(2)(cos120^°-cos20^°)=(1)/(4) ； 方法二:原式=cos^210^°-sin50^°sin70^°=(1)/(2)+(1)/(2)cos20^°-sin50^°sin70^° =(1)/(2)+(1)/(2)cos(70^°-50^°)-sin50^°sin70^°=(1)/(2)+(1)/(2)(cos50^°cos70^°+sin50^°sin70^°)-sin50^°sin70^° =(1)/(2)+(1)/(2)(cos50^°cos70^°-sin50^°sin70^°)=(1)/(2)+(1)/(2)cos120^°=(1)/(4) .'},
  {id:222,question:'某学校在不同时段开设了三门选修课，要求每位学生至少选择其中一门,则A、B、C三位学生可牟的选法有种',answer:'343',source:'2021年广西预赛',knowledge:'组合',year:2021,difficulty:3,explanation:'每个同学有7种不同的选法，由乘法原理选法总数为7^3=343 .'},
  {id:223,question:'函数f(x)=(x-x^3)/((1+x^2)^2) 的值域是',answer:'(-(1)/(4),(1)/(4)).',source:'2021年江西预赛',knowledge:'函数',year:2021,difficulty:3,explanation:'f(x)=(x)/(1+x^2)⋅(1-x^2)/(1+x^2) , 令x=tanα ,则f=(1)/(2)sin2α⋅cos2α=(1)/(4)sin4α ,由此,-(1)/(4)⩽f⩽(1)/(4) , 当x= -tan(π)/(8),tan(π)/(8) 时两边分别取得等号.'},
  {id:224,question:'若定义在R上的函数f(x)满足f\'(x)-2f(x)-4&gt;0，f(0)=-1，则不等式f(x)&gt;e^2x-2的解为___________',answer:'x&gt;0',source:'2018年广西预赛',knowledge:'导数与极限',year:2018,difficulty:3,explanation:'构造函数g(x)=e^-2x(f(x)+2)，则g(0)=1.由g\'(x)=e^-2x(f\'(x)-2f(x)-4)&gt;0可知g(x)在（-∞,+∞）内单调递增，从而有g(x)&gt;1⇔x&gt;0.故f(x)&gt;e^2x-2⇔x&gt;0.'},
  {id:225,question:'设直角坐标平面上两个区域为M=((x,y)∈R^2∣0≤y≤min(2x,3-x)) ,N=((x,y)∈R^2∣t≤x≤t+2) ,记M 与N 的公共部分面积为f(t) 。当0≤t≤1 时，则 f(t) 的表达式为',answer:'f(t)=-(3)/(2)t^2+t+(5)/(2)',source:'2021年浙江预赛',knowledge:'不等式',year:2021,difficulty:3,explanation:'由图可知 f(t)=3-t^2-(1)/(2)(1-t)^2=-(3)/(2)t^2+t+(5)/(2) .'},
  {id:226,question:'使得3n+1 与5n+1 同时成为完全平方数的最小正整数n=',answer:'16',source:'2021年江西预赛',knowledge:'数论',year:2021,difficulty:3,explanation:'首先,当n=16 时,3n+1=49=7^2,5n+1=81=9^2 ,其次,对于集合M={1,2,⋯,15} 中的任一元索a,3a+1 与5a+1 中至少有一个不是平方数.'},
  {id:227,question:'若x_1=1, x_2=1-i, x_3=1+i (i 为虚数单位)为方程x^3+ax^2+bx+c=0 的三个解,则a+b-c=',answer:'3',source:'2021年福建预赛',knowledge:'复数',year:2021,difficulty:3,explanation:'依题意有： x^3+ax^2+bx+c=(x-1)⋅(x-(1-i))[x-(1+i)] =(x-1)(x^2-2x+2)=x^3-3x^2+4x-2 ， 于是,a=-3, b=4, c=-2 . 所以,a+b-c=-3+4-(-2)=3 .'},
  {id:228,question:'已知数列(a_n) 满足a_1=1,a_2=4,a_3=10 ,对任意的n≥2 有an+12-2an2=a_na_n+2-2a_n-1a_n+1 ,则a_21 的个位数字是',answer:'6',source:'2021年新疆预赛',knowledge:'数列',year:2021,difficulty:3,explanation:'∵an+12-2an2=a_na_n+2-2a_n-1a_n+1,∴a_n+1(a_n+1+2a_n-1)=a_n(a_n+2+2a_n) , ∴(a_n+1+2a_n-1)/(a_n)=(a_n+2+2a_n)/(a_n+1) , ∴((a_n+1+2a_n-1)/(a_n)) 是常数列，又(a_3+2a_1)/(a_2)=3 , ∴(a_n+2+2a_n)/(a_n+1)=3,∴a_n+1=3a_n-2a_n-1 . 由特征根方程求得a_n=3×2^n-1-2,∴a_21 的个位数字为6.'},
  {id:229,question:'已知x_i∈{-1,1},i=1,2,…,2021 ,并且x_1+x_2+⋯+x_k≥0(k=1,2,…,2020) ，x_1+x_2+⋯+x_2021=-1 .则有序数组(x_1,x_2,⋯,x_2021) 的组数为',answer:'(1)/(1011)C20201010',source:'2021年重庆预赛',knowledge:'组合',year:2021,difficulty:3,explanation:'由x_1+x_2+⋯+x_2020≥0,x_1+x_2+⋯+x_2021=-1,x_2021∈{-1,1} , 所以x_2021=-1 ,x_1+x_2+⋯+x_2020=0. 所以在x_1,x_2,⋯,x_2020 中有1010个1、1010个-1 ， 且随时保证x_1+x_2+⋯+x_k≥0(k=1,2,⋯,2020) . 即为卡特兰数(1)/(1011)C20201010 .'},
  {id:230,question:'计算sin^220^∘+cos^250^∘+sin20^∘cos50^∘=',answer:'(3)/(4)',source:'2021年浙江预赛',knowledge:'三角函数',year:2021,difficulty:3,explanation:'原式=sin^220^°+cos10^°cos50^°=(1-cos40^°)/(2)+((1)/(2)+cos40^°)/(2)=(3)/(4) .'},
  {id:231,question:'直线x-2y-1=0 与抛物线y^2=4x 交于A,B两点,C 为抛物线上的一点,∠ACB=90^° ,则点C 的坐标为',answer:'(1,-2) 或(9,-6)',source:'2020年新疆预赛',knowledge:'解析几何',year:2020,difficulty:3,explanation:'设A(x_1,y_1),B(x_2,y_2),C(t^2,2t) ,由{x-2y-1=0,; y^2=4x , 得y^2-8y-4=0, 则y_1+y_2=8 ，y_1⋅y_2=-4 .又x_1=2y_1+1,x_2=2y_2+1 ,所以 x_1+x_2=2(y_1+y_2)+2=18 , x_1⋅x_2=4y_1⋅y_2+2(y_1+y_2)+1=1 . 因为∠ACB=90^° ,所以CA⋅CB=0 ,印有(t^2-x_1)(t^2-x_2)+(2t-y_1)(2t-y_2)=0 . 即:t^4-(x_1+x_2)t^2+x_1⋅x_2+4t^2-2(y_1+y_2)t+y_1⋅y_2=0 ， 即:t^4-14t^2-16t-3=0 , 即:(t^2+4t+3)(t^2-4t-1)=0 . 显然t^2-4t-1≠0 ,否则t^2-2⋅2t-1=0 ,则点C 在直线x-2y-1=0 上，从而点C 与点A 或点B 重合.所以t^2+4t+3=0 ,解得t_1=-1,t_2=-3. 故所求点C 的坐标为(1,-2) 或(9,-6) .'},
  {id:232,question:'已知a_1,a_2 ,a_3,a_4 均为实数.若集合{a_1,a_2,a_3,a_4} 的所有非空真子集的元素之和为28,则a_1+a_2+a_3+a_4=',answer:'4',source:'2020年重庆预赛',knowledge:'数列',year:2020,difficulty:3,explanation:'注意到,含有元素a_i(i=1,2,3,4) 的非空真子集有7个. 则I={a_1,a_2,a_3,a_4} 的所有非空真子集的元素之和为7(a_1+a_2+a_3+a_4)=28 . 从而,a_1+a_2+a_3+a_4=4.'},
  {id:233,question:'由数字1，2和3组成的6位数中，若每个数字至少出现一次，则这样的6位数共有个',answer:'540',source:'2021年新疆预赛',knowledge:'数论',year:2021,difficulty:3,explanation:'记1,2,3组成的6位数的集合为S,A_i(i=1,2,3) 分别表示S 中不含i 的6位数的集合， 则由容斥原理可得： (A_1∩overline(A_2)∩overline(A_3))=|S|-(A_1)-(A_2)-(A_3)+(A_1∩A_2)+(A_2∩A_3)+(A_1∩A_3)-(A_1∩A_2∩A_3) =3^6-3×2^6+3=540 .'},
  {id:234,question:'已知数列{a_n} 满足:a_0=sqrt(6),a_n+1=[a_n]+(1)/({a_n}) ，其中,[a ]表示不超过实数a 的最大整数,{a}=a-[a]. 则a_2020=',answer:'6060+sqrt(6)',source:'2020年四川预赛',knowledge:'数列',year:2020,difficulty:3,explanation:'注意到， a_0=sqrt(6)=2+(sqrt(6)-2) , a_1=2+(1)/(sqrt(6)-2)=4+(sqrt(6)-2)/(2) ， a_2=4+(2)/(sqrt(6)-2)=8+(sqrt(6)-2) ， a_3=8+(1)/(sqrt(6)-2)=10+(sqrt(6)-2)/(2) ， a_4=10+(2)/(sqrt(6)-2)=14+(sqrt(6)-2) . 由数学归纳法易得 a_2k=6k+sqrt(6) , a_2k+1=6k+4+(sqrt(6)-2)/(2)(k∈N) . 因此,a_2020=6060+sqrt(6) .'},
  {id:235,question:'已知正实数x、y满足(1)/(x+3y)+(1)/(2x+y)=1 .则x+y 的最小值为',answer:'(3+2sqrt(2))/(5)',source:'2020年四川预赛',knowledge:'不等式',year:2020,difficulty:3,explanation:'由1=(1)/(x+3y)+(1)/(2x+y)=(1)/(x+3y)+(2)/(4x+2y) ⩾((1+sqrt(2))^2)/(5(x+y)) ⇒x+y⩾((1+sqrt(2))^2)/(5)=(3+2sqrt(2))/(5). 当x=(4+sqrt(2))/(10),y=(2+3sqrt(2))/(10) 时,可得上式等号成立. 故x+y 的最小值为(3+2sqrt(2))/(5) .'},
  {id:236,question:'已知椭圆(y^2)/(4)+x^2=1,P 为椭圆上的任意一点,过点P 分别作与l_1:y=2x 和l_2: y=-2x 平行的直线分别与直线l_2 ,l_1 交于M,N 两点.则(MN) 的最大值为',answer:'2',source:'2020年甘肃预赛',knowledge:'解析几何',year:2020,difficulty:3,explanation:'如图5. 设P(x_P,y_P). 于是,平行于l_1,l_2 的直线分别为l_3:y=2(x-x_P)+y_P , l_4:y=-2(x-x_P)+y_P . 由2x-2x_P+y_P=-2x ⇒x_M=(2x_P-y_P)/(4),y_M=-(2x_P-y_P)/(2). 由-2x+2x_P+y_P=2x ⇒x_N=(2x_P+y_P)/(4),y_N=(2x_P+y_P)/(2) . 故MN^2=((1)/(4)×2y_P)^2+((1)/(2)×4x_P)^2 =(1)/(4)yP2+4xP2 . 又(1)/(4)yP2+xP2=1 ,则MN^2=1+3xP2⩽4 . 从而,MN⩽2 ,当P(1,0) 或(-1,0) 时,MN=2 .'},
  {id:237,question:'数学家斐波那契在研究兔子繁殖问题时发现有这样一列数:1,1,2,3,5,8,13,⋯ 该数列的特点是:前两个数均为1,从第三个数起,每一个数均等于它前面两个数的和.把这样的一列数组成的数列{a_n} 称为“斐波那契数列”.则 (a_1a_3+a_2a_4+a_3a_5+⋯+a_2019a_2021)- (a22+a32+a42+⋯+a20202) =',answer:'1',source:'2020年吉林预赛',knowledge:'数列',year:2020,difficulty:3,explanation:'由题意知 a_1a_3-a22=1,a_2a_4-a32=-1 ， a_3a_5-a42=1,a_4a_6-a52=-1 ， …… 由此可归纳出结论a_na_n+2-an+12=(-1)^n+1(n∈Z_+) . 则原式 =(a_1a_3-a22)+(a_2a_4-a32)+ (a_3a_5-a42)+⋯+(a_2019a_2021-a20202), 即1009 个-1 与1010个1相加，结果为1.'},
  {id:238,question:'设椭圆(x^2)/(4)+(y^2)/(3)=1 的左焦点为F ,过(1,1) 的直线l 与橙圆交于点A、B.当△FAB 的周长最大时,△FAB 的面积为',answer:'3',source:'2020年吉林预赛',knowledge:'解析几何',year:2020,difficulty:3,explanation:'设F_1 为右焦点.注意到， FA+FB+AB =2a-F_1A+2a-F_1B+AB =4a-(F_1A+F_1B-AB)⩽4a , 上式取等号时,l 过点F_1 .于是,l 与x 轴垂直,此时,S_△FAB=3.'},
  {id:239,question:'设有理数r=(p)/(q)∈(0,1),其中p,q为互素的正整数,且pq整除3600.这样的有理数r的个数为',answer:'112',source:'2021年全国高中数学联赛A卷一试',knowledge:'数论',year:2021,difficulty:5,explanation:'设集合Ω={r|r=(p)/(q),p,q∈N^*,(p,q)=1,pq|3600}. 考虑Ω的任一元素r的最简分数形式(p)/(q),因3600的标准分解为2^4×3^2×5^2, 可设p=2^A×3^B×5^C,q=2^a×3^b×5^c,其中min{A,a}=min{B,b}=min{C,c}=0,且A+a≤4,B+b≤2,C+c≤2. 这样的数对(A,a)共有9种取法,数对(B,b)共有5种取法,数对(C,c)共有5种取法.所以Ω的元素个数(Ω)=9×5×5=225. 满足条件的有理数的全体为Ω∩(0,1).注意到,r∈Ω当且仅当(1)/(r)∈Ω,特别地，1∈Ω.因此,Ω∖{1}中的元素可按乘积为1配成(1)/(2)((Ω)-1)=112对,每对中恰有一数属于(0,1),即恰有一数满足条件.从而所求有理数r的个数为112.'},
  {id:240,question:'设x、y均为正数.则M=(4x)/(x+3y)+(3y)/(x) 的最小值为',answer:'3',source:'2020年甘肃预赛',knowledge:'不等式',year:2020,difficulty:3,explanation:'注意到,M=(4x)/(x+3y)+(x+3y)/(x)-1⩾3. 当x=3y 时,M=3.'},
  {id:241,question:'已知半径为4的球面上有两点A、B,AB=4sqrt(2) ,球心为O.若球面上的动点C 满足二面角C-AB-O 的大小为60^° ,则四面体OABC外接球的半径为',answer:'(4sqrt(6))/(3).',source:'2020年甘肃预赛',knowledge:'立体几何',year:2020,difficulty:3,explanation:'易知,C 的轨迹为一段优弧,并设该优弧的圆心为D ,联结OD,如图4. 设AB的中点为E ,联结OE、DE.则∠DEO=60^° . 延长OD,过点E 作面OAB的垂线,与OD交于点K . 则K 为四面体OABC的外接球球心. 故OE=(1)/(2)AB=2sqrt(2),∠DOE=30^° . 于是,所求半径为KO=(4sqrt(2))/(sqrt(3))=(4sqrt(6))/(3) .'},
  {id:242,question:'设正实数a,b,c满足abc=10^11 ,且lga⋅lg(bc)+lgb⋅lg(ca)+lgc⋅lg(ab)=40 ,则sqrt(lg^2a+lg^2b+lg^2c)=',answer:'19',source:'2021年重庆预赛',knowledge:'函数',year:2021,difficulty:3,explanation:'令x=lga,y=lgb,z=lgc ,则x+y+z=11,2(xy+yz+zx)=40 , 从而sqrt(x^2+y^2+z^2)=sqrt(11^2-40)=sqrt(81)=9.'},
  {id:243,question:'如图,在四边形ABCD中,已知cos∠BAD=(3)/(4),∠BAC=∠DAC,AD&lt;AB ,且AB=5 , AC=BD=sqrt(14). 若AC=λAB+μAD (λ,μ∈R) ,则λ+μ=',answer:'(7)/(5)',source:'2021年福建预赛',knowledge:'平面向量',year:2021,difficulty:3,explanation:'在△ABD 中由余弦定理，得BD^2=AB^2+AD^2-2AB⋅AD⋅cos∠BAD. 所以,14=25+AD^2-2⋅5⋅AD⋅(3)/(4) . 解得,AD=2 ,或AD=(11)/(2) (由AD&lt;AB=5 ,舍去). 因此,AD=2 . 解法一：如图，在AB上取点E ,使得AE=2. 连接DE,交AC于点F. 则由AC为∠BAD 的平分线知,AF⊥DE,F 为DE中点. 在△ADE 中由余弦定理,得DE^2=2^2+2^2-2⋅2⋅2⋅(3)/(4)=2 . 所以,AF=sqrt(AE^2-((1)/(2)DE)^2)=sqrt(4-(1)/(2))=(sqrt(14))/(2)=(1)/(2)AC . 所以,AC=2AF=AE+AD=(2)/(5)AB+AD . 所以,λ=(2)/(5),μ=1,λ+μ=(7)/(5) . 解法二:由AC平分∠BAD ,可设AC=m((AB)/(|AB|)+(AD)/(∣AD)) (m&gt;0) . 因此,AC=m((AB)/(5)+(AD)/(2)) , AC^2=m^2⋅((AB)/(5)+(AD)/(2))^2=m^2⋅((AB^2)/(5^2)+2⋅(AB)/(5)(AD)/(2)+(AD^2)/(2^2)) =m^2⋅(1+2⋅cos∠BAD+1)=(7)/(2)m^2 . 又AC=sqrt(14) , 所以,(7)/(2)m^2=14, m=2, AC=2((AB)/(5)+(AD)/(2))=(2)/(5)AB+AD . 所以,λ=(2)/(5),μ=1,λ+μ=(7)/(5) .'},
  {id:244,question:'(1)/(sin10^°)-(sqrt(3))/(cos10^°) 的值是',answer:'4',source:'2021年江西预赛',knowledge:'三角函数',year:2021,difficulty:3,explanation:'(1)/(sin10^°)-(sqrt(3))/(cos10^°)=(cos10^°-sqrt(3)sin10^°)/(sin10^°⋅cos10^°)=4⋅((1)/(2)cos10^°-(sqrt(3))/(2)sin10^°)/(2sin10^°cos10^°)=4⋅(sin20^°)/(sin20^°)=4.'},
  {id:245,question:'已知m 为非零向量，n 为单位向量,m≠n,m 与m-n 的夹角为60^°,|m|∈(0,a] ,则a 的最小值为',answer:'(2)/(sqrt(3))',source:'2021年广西预赛',knowledge:'平面向量',year:2021,difficulty:3,explanation:'在△ABC 中设CA=m,CB=m-n ,则BA=n. 设AD为△ABC 的外接圆的直径.则|AD(=(2)/(sqrt(3)),)m|=|CA|≤|AD∣=(2)/(sqrt(3)) , (当AC为外接圆的直径时取等号）.'},
  {id:246,question:'设a_0=0,a_1=a_2=1,a_3n=a_n,a_3n+1=a_3n+2=a_n+1(n≥1) ,则a_2021=',answer:'6',source:'2021年浙江预赛',knowledge:'数列',year:2021,difficulty:3,explanation:'a_2021=a_3×673+2=a_673+1=a_3×224+1+1=a_224+2 =a_3×74+2+2=a_74+3=a_3×24+2+3=a_24+4=a_8+4=a_2+5=6 .'},
  {id:247,question:'设函数f(x)满足:对任意非零实数x,均有f(x)=f(1)⋅x+(f(2))/(x)-1,则f(x)在(0,+∞)上的最小值为',answer:'sqrt(3)-1.',source:'2021年全国高中数学联赛A卷一试',knowledge:'函数',year:2021,difficulty:5,explanation:'令x=1,2,分别得f(1)=f(1)+f(2)-1与f(2)=2f(1)+(f(2))/(2)-1,解得f(2)=1,f(1)=(3)/(4).从而对x≠0,有f(x)=(3)/(4)x+(1)/(x)-1. 当x∈(0,+∞)时,f(x)≥2sqrt((3)/(4)x⋅(1)/(x))-1=sqrt(3)-1,当x=(2sqrt(3))/(3)时等号成立.所以f(x)在(0,+∞)上的最小值为sqrt(3)-1.'},
  {id:248,question:'过拋物线E:y^2=2x 的焦点F 作两条斜率之积为-(1)/(2) 的直线l_1,l_2 ,其中l_1 交E 于A,C两点,l_2 交E 于B,D两点，则|AC|+2|BD| 的最小值为',answer:'18sqrt(2)+6',source:'2021年重庆预赛',knowledge:'解析几何',year:2021,difficulty:3,explanation:'设直线的倾斜角分别为α,β ,则tanαtanβ=-(1)/(2) , 从而|AC|+2|BD|= (2)/(sin^2α)+(4)/(sin^2β)=(2)/(tan^2α)+(4)/(tan^2β)+6 ≥2sqrt((8)/(tan^2αtan^2β))+6=8sqrt(2)+6 . 当且仅当|tanβ|=sqrt(2)|tanα| 时等号成立.'},
  {id:249,question:'设集合X={1,2,⋯,20},A是X的子集,A的元素个数至少是2,且A的所有元素可排成连续的正整数,则这样的集合A的个数为',answer:'190',source:'2020高中数学联赛B卷（第01试）',knowledge:'集合',year:2020,difficulty:3,explanation:'每个满足条件的集合A可由其最小元素a与最大元素b唯一确定,其中a,b∈X,a&lt;b,这样的(a,b)的取法共有C202=190种,所以这样的集合A的个数为190.'},
  {id:250,question:'若x、y为实数,则|2x+y|,|x-y| 、|1+y| 这三个数中的最大数的最小值为',answer:'(1)/(2)',source:'2020年重庆预赛',knowledge:'不等式',year:2020,difficulty:3,explanation:'max{|2x+y|,|x-y|,|1+y|} ⩾(1)/(6)(|2x+y|+2|x-y|+3|1+y|) ⩾(1)/(6)|(2x+y)-2(x-y)-3(1+y)| =(1)/(2) , 当且仅当x=0,y=-(1)/(2) 时,上式取到最小值.'},
  {id:251,question:'设对每个实数x,f(x) 的值皆取x^2,6-x,2x+15 中的最小值,则f(x) 的最大值是',answer:'9',source:'2021年江西预赛',knowledge:'函数',year:2021,difficulty:3,explanation:'如图,解出其交点,则有f(x)=(2x+15,x⩽-3,; x^2,-3⩽x⩽2,; 6-x,x⩾2,) 则当x⩽-3 ,f(x)⩽9; 当-3⩽x⩽2,f(x)⩽9; 当x⩾2,f(x)⩽4 , 因此f(x)⩽9 ,x∈R .'},
  {id:252,question:'方程x^2-8[x]+7=0的解为',answer:'(4-sqrt(17),1)∪(7,4+sqrt(17))',source:'2019年内蒙古预赛',knowledge:'高斯函数',year:2019,difficulty:3,explanation:'∵x≤[x]=(x^2+7)/(8)&lt;x+1，故方程解集为(4-sqrt(17),1)∪(7,4+sqrt(17)).'},
  {id:253,question:'设正三棱锥P-ABC 的底面边长为1,高为sqrt(2) ，过底边BC作此三棱锥的截面，则截面面积的最小值为',answer:'(3sqrt(14))/(28)',source:'2021年重庆预赛',knowledge:'立体几何',year:2021,difficulty:3,explanation:'如图，设截面与边PA交于点Q ,点P 在底面的射影为点O ， 延长AO交BC于点D ,则BC⊥QD , 由于BC的长为定值，当界面QBC的面积最小时，线段QD的长度最小， 此时QD⊥PA . 由于OA=(sqrt(3))/(3),PO=sqrt(2) ,则PA=(sqrt(21))/(3) ,从而sin∠PAO=(PO)/(PA)=(sqrt(42))/(7) , 则QD=ADsin∠PAO=(sqrt(3))/(2)⋅(sqrt(42))/(7)=(3sqrt(14))/(14)⇒S=(1)/(2)QD⋅BC=(3sqrt(14))/(28).'},
  {id:254,question:'设数列(a_n) 满足:a_1=(1)/(4),a_n+1=a_n+an2(n∈Z_+) .记T_2020=(1)/(a_1+1)+(1)/(a_2+1)+⋯+(1)/(a_2020+1) .若T_2020 的值在区间(k,k+1) 内,则整数k 的值为',answer:'3',source:'2020年甘肃预赛',knowledge:'数列',year:2020,difficulty:3,explanation:'由题意知 (1)/(a_n+1)=(1)/(a_n(a_n+1))=(1)/(a_n)-(1)/(a_n+1) ⇒(1)/(a_n+1)=(1)/(a_n)-(1)/(a_n+1) ⇒T_2020=(1)/(a_1)-(1)/(a_2)+(1)/(a_2)-(1)/(a_3)+⋯+(1)/(a_2020)-(1)/(a_2021) =(1)/(a_1)-(1)/(a_2021)=4-(1)/(a_2021). 下证T_2020∈(3,4) ,只需证a_2021&gt;1. 由a_n+1=a_n+an2&gt;a_n ⇒a_17=a162+a152+⋯+a22+a_1&gt;16a12=1 . 由归纳法,知对于任意的n&gt;17,a_n&gt;1 ,则T_2020∈(3,4) ,即k=3 .'},
  {id:255,question:'集合M={1,2,3,4,5,6} 的所有子集的元素的和等于',answer:'672',source:'2021年广西预赛',knowledge:'集合',year:2021,difficulty:3,explanation:'所有子集的元素的和为2^5(1+2+3+4+5+6)=672 .'},
  {id:256,question:'设i_1,i_2,⋯,i_n 为集合{1,2,⋯,n} 的一个排列.若存在k&lt;l 且i_k&gt;i_l ,则称数对(i_k,i_l) 为一个逆序,排列中所有逆序数对的数目称为此排列的逆序数.比如,排列1432的逆序为43、42、32,此排列的逆序数就是3.则当n=6 时,且i_3=4 的所有排列的逆序数的和为',answer:'912',source:'2020年浙江预赛',knowledge:'数列',year:2020,difficulty:3,explanation:'含6的逆序数有A44(5+4+2+1)=12A44(个) ， 含5的逆序数有A44×4+(A33×4+C31×A33×3)+ (2C21A33+C21A33)+C31A33 =38A33(个) , 含4的逆序数有3A22A33+2C21×2×3×A33+A32A33 =216(个) ， 含3的逆序数有2A52×2+2A52=6A52=120(个) ， 含2的逆序数有A53=60 个. 故总的逆序数有912个.'},
  {id:257,question:'设n 为正整数，函数f_n(x)=(n+x+(1)/(n+x))/(n+1),x∈(0,1) 的值域为I_n,I=∪_{n=1}^{∞}(I_n) ,则I=',answer:'((5)/(6),(5)/(4))',source:'2021年广西预赛',knowledge:'函数',year:2021,difficulty:3,explanation:'f_n(x) 单调递增,f_n(0)&lt;f_n(x)&lt;f_n(1),I_n=(f_n(0),f_n(1)),n∈N_+ . f_n(0)≥f_2(0)=(5)/(6), f_n(1)≤f_1(1)=(5)/(4). 因此I=((5)/(6),(5)/(4)) .'},
  {id:258,question:'已知单位向量a,b ,则|a-2b| 的取值范围为',answer:'1≤|a-2b|≤3',source:'2021年浙江预赛',knowledge:'平面向量',year:2021,difficulty:3,explanation:'|a-2b|=sqrt(5-4a⋅b), -1≤a⋅b≤1 , 所以 1≤|a-2b|≤3 .'},
  {id:259,question:'设x、y满足约束条件{x-y-2⩾0,; x-5⩽0,; y+2⩾0. 则z=x^2+y^2 的最小值与最大值的和为',answer:'36',source:'2020年吉林预赛',knowledge:'不等式',year:2020,difficulty:3,explanation:'由约束条件作出可行域,如图1,即△ABC 内部及其边界,其中,A(5,3),B(5,-2) ,C(0,-2) . 注意到,x^2+ y^2 的几何意义是点P(x,y) 到坐标原点距离的平方,于是,x^2+y^2 的最大值为AO^2=25+9=34. 而x^2+y^2 的最小值为:原点到直线x-y- 2=0 距离的平方,即 PO^2=((2)/(sqrt(2)))^2=2 . 故所求为34+2=36 .'},
  {id:260,question:'在平面直角坐标系xOy中,拋物线Γ:y^2=2px(p&gt;0)的焦点为F,过Γ上一点P(异于O)作Γ的切线,与y轴交于点Q.若(FP)=2,(FQ)=1,则向量OP与OQ的数量积为',answer:'(3)/(2)',source:'2021年全国高中数学联赛A卷一试',knowledge:'解析几何',year:2021,difficulty:5,explanation:'设P((t^2)/(2p),t)(t≠0)，则Γ的切线PQ的方程为yt=p(x+(t^2)/(2p)). 令x=0得y=(t)/(2),故Q(0,(t)/(2)).又F坐标为((p)/(2),0),进而(FP)=sqrt(((p)/(2)-(t^2)/(2p))^2+t^2)=(p)/(2)+(t^2)/(2p),(FQ)=(sqrt(p^2+t^2))/(2)， 结合(FP)=2,(FQ)=1可分别得p^2+t^2=4p,p^2+t^2=4.所以p=1,t^2=3.于是OP⋅OQ=(t^2)/(2)=(3)/(2).'},
  {id:261,question:'△ABC 中,AB=c,BC=a,AC=b ,且a^4+b^4+c^4=2c^2(a^2+b^2) ,若∠A=72^° ,则∠B=',answer:'63',source:'2021年江西预赛',knowledge:'三角函数',year:2021,difficulty:3,explanation:'cos^2C=((a^2+b^2-c^2)/(2ab))^2=(a^4+b^4+c^4+2a^2b^2-2c^2(a^2+b^2))/(4a^2b^2)=(2a^2b^2)/(4a^2b^2)=(1)/(2) ， cosC=±(sqrt(2))/(2) ,但C&lt;180^° -A=108^°,cosC=(sqrt(2))/(2),C=45^° , 因此B=180^°-A-C=63^°.'},
  {id:262,question:'方程(1)/(x)+(1)/(y)=(1)/(2021) 的正整数解的组数为',answer:'9',source:'2021年江西预赛',knowledge:'函数',year:2021,difficulty:3,explanation:'由(1)/(x)+(1)/(y)=(1)/(2021) ,得到(x-2021)(y-2021)=2021^2=43^2⋅47^2 ,因43^2⋅47^2 共有(2+1)(2+ 1)=9 个正因数,x-2021 可取9个值,即x 可取9个值,而当x 取定后,y 的值便唯一确定;因此方程有9组正整数解.'},
  {id:263,question:'已知α,β∈((3π)/(4),π),sin(α+β)=-(3)/(5), sin(β-(π)/(4))=(12)/(13) .则cos(α+(π)/(4)) 的值为',answer:'-(56)/(65)',source:'2021年吉林预赛',knowledge:'三角函数',year:2021,difficulty:3,explanation:'因为α,β∈((3π)/(4),π) .所以α+β∈((3π)/(2),2π),β-(π)/(4)∈((π)/(2),(3π)/(4)) . 因为sin(α+β)=-(3)/(5),sin(β-(π)/(4))=(12)/(13) , 所以cos(α+β)=(4)/(5), cos(β-(π)/(4))=-(5)/(13) . 所以cos(α+(π)/(4))=cos(α+β-(β-(π)/(4))) =cos(α+β)cos(β-(π)/(4))+sin(α+β)sin(β-(π)/(4)) =(4)/(5)×(-(5)/(13))+(-(3)/(5))×(12)/(13)=-(56)/(65) .'},
  {id:264,question:'已知一个正三棱柱的各条棱长均为3,则其外接球的体积为',answer:'(7sqrt(21))/(2)π',source:'2020高中数学联赛B卷（第01试）',knowledge:'立体几何',year:2020,difficulty:3,explanation:'如图,设面ABC和面A_1B_1C_1的中心分别为O和O_1,记线段OO_1的中点为P,由对称性知,P为正三棱柱外接球的球心,PA为外接球的半径. 易知PO⊥AO,所以PA=sqrt(PO^2+AO^2)=sqrt(((3)/(2))^2+(sqrt(3))^2)=(sqrt(21))/(2) 故外接球的体积为(4)/(3)π((sqrt(21))/(2))^3=(7sqrt(21))/(2)π.'},
  {id:265,question:'某食品厂制作了4种不同的精美卡片，在该厂生产的每袋食品中都随机装入一张卡片，规定：如果收集齐了4种不同的卡片，便可获得奖品小明一次性购买该种食品6袋，那么小明获奖的概率是',answer:'(195)/(512)',source:'2021年吉林预赛',knowledge:'概率',year:2021,difficulty:3,explanation:'总共有4^6 种可能,其中获奖的情况可分为两类，第一类是有3袋食品的卡片相同的获奖情况(即AAABCD)有C63×4! 种,第二类是有两组2袋食品的卡片相同的获奖情况(即AABBCD)有(C62C42)/(2)×4! 种. 所以概率是(195)/(512) .'},
  {id:266,question:'已知由六个正整数组成的六位十进制数中,其个位上的数字为4的倍数,十位和百位上的数字均为3的倍数,且六位数的数码和为21.则满足上述条件的六位数的个数为',answer:'126',source:'2020年浙江预赛',knowledge:'数论',year:2020,difficulty:3,explanation:'易知,后三位只可能为：334,338,664,364,368,394,634,638,934. 又334的前三位和为11,则共有C102 种. 故C102+C62+C42+2(C72+C32+C42) =45+15+6+2(21+3+6) =66+2×30=126 .'},
  {id:267,question:'正三棱锥P-ABC的所有棱长均为1,L,M,N分别为棱PA,PB,PC的中点,则该正三棱锥的外接球被平面LMN所截的截面面积为',answer:'(π)/(3)',source:'2020高中数学联赛A卷（第01试）',knowledge:'立体几何',year:2020,difficulty:3,explanation:'由条件知平面LMN与平面ABC平行,且点P到平面LMN,ABC的距离之比为1:2.设H为正三棱锥P-ABC的面ABC的中心,PH与平面LMN交于点K,则PH⊥平面ABC,PK⊥平面LMN,故PK=(1)/(2)PH. 正三棱锥P-ABC可视为正四面体,设O为其中心(即外接球球心),则O 在PH上,且由正四面体的性质知OH=(1)/(4)PH.结合PK=(1)/(2)PH可知OK=OH, 即点O到平面LMN,ABC等距.这表明正三棱锥的外接球被平面LMN,ABC所截得的截面圆大小相等. 从而所求截面的面积等于ΔABC的外接圆面积,即π⋅((AB)/(sqrt(3)))^2=(π)/(3).'},
  {id:268,question:'若关于x 的不等式(x-2)e^x&lt;ax+1 有且仅有三个不同的整数解，则整数a 的最小值为',answer:'3',source:'2021年福建预赛',knowledge:'导数与极限',year:2021,difficulty:3,explanation:'设f(x)=(x-2)e^x, g(x)=ax+1. 则f^\'(x)=(x-1)e^x,x&lt;1 时,f^\'(x)&lt;0;x&gt;1 时,f^\'(x)&gt;0 . 因此,f(x) 在区间(-∞,1) 上递减，在区间(1,+∞) 上递增: 且x&lt;2 时，f(x)&lt;0;x&gt;2 时,f(x)&gt;0 . 由此作出f(x) 的草图如图所示. 又g(x) 的图像是过点(0,1) 的直线，结合图像可知a&gt;0. 由于a&gt;0 时，f(0)=-2&lt;g(0)=1;f(1)=-e&lt;g(1)=a+1 ; f(2)=0&lt;g(2)=2a+1 , 因此,0,1,2是不等式(x-2)e^x&lt;ax+1 的三个整数解. 由于不等式(x-2)e^x&lt;ax+1 有且仅有三个不同的整数解, 所以(f(-1)≥g(-1); f(3)≥g(3)) ，即(-3e^-1≥-a+1; e^3≥3a+1,1+(3)/(e)≤a≤(e^3-1)/(3)) . 经检验，a=3符合要求， 所以，符合条件的a的最小值为3.'},
  {id:269,question:'设F_1,F_2 为双曲线C:(x^2)/(a^2)-(y^2)/(b^2)=1(a&gt;0,b&gt;0) 的左、右焦点,过F_2 的直线l 与双曲线C 的右支交于A、B两点,且AF_1⋅AF_2=0,F_2B+2F_2A=0 ，则双曲线C 的离心率为',answer:'(sqrt(17))/(3)',source:'2020年福建预赛',knowledge:'解析几何',year:2020,difficulty:3,explanation:'如图4,设(AF_2)=t. 依题意有 (BF_2)=2t |AB|=3ι , (AF_1)=2a+t , (BF_1)=2a+2t 由AF_1⋅AF_2=0 ⇒AF_1⊥AF_2. 则((AF_1)^2+(AF_2)^2=(F_1F_2)^2,; (AF_1)^2+|AB|^2=(F_1B)^2) ⇒((2a+t)^2+t^2=(2c)^2; (2a+t)^2+(3t)^2=(2a+2t)^2) ⇒t=(2)/(3)a,c=(sqrt(17))/(3)⇒e=(sqrt(17))/(3).'},
  {id:270,question:'等差数列(a_n)满足a_2021=a_20+a_21=1,则a_1的值为',answer:'(1981)/(4001)',source:'2021年全国高中数学联赛A卷一试',knowledge:'数列',year:2021,difficulty:5,explanation:'设(a_n)的公差为d.由条件知([a_1+2020d=1,; 2a_1+39d=1,])解得a_1=(1981)/(4001).'},
  {id:271,question:'设三个正四面体的棱长均为整数,它们的体积之和为(51sqrt(2))/(4). 则这些正四面体的表面积之和为',answer:'35sqrt(3)',source:'2020年广西预赛',knowledge:'立体几何',year:2020,difficulty:3,explanation:'设三个正四面体的棱长分别为a,b,c. 不妨设0&lt;a⩽b⩽c. 由(sqrt(2))/(12)(a^3+b^3+c^3)=(51sqrt(2))/(4) ⇒a^3+b^3+c^3=153 , 其中,c^3⩽125 ,即c⩽5 . 因为3c^3⩾a^3+b^3+c^3=153 ,所以， c^3⩾51⇒c⩾4. 进而,c=4 或c=5. 若c=4 ,不存在符合条件的a,b; 若c=5 ,易得a=1,b=3. 从而,所求表面积的和为 4((1)/(2)a^2sin60^°+(1)/(2)b^2sin60^°+(1)/(2)c^2sin60^°) =sqrt(3)(a^2+b^2+c^2)=sqrt(3)(1^2+3^2+5^2) =35sqrt(3) .'},
  {id:272,question:'已知函数f(x)=(e^x-e^-x)⋅x^3,若m满足f(log_2m)+f(log_0.5m)⩽2((e^2-1)/(e)).则实数m的取值范围是',answer:'((1)/(2),2)',source:'2019年贵州预赛',knowledge:'导数与极限',year:2019,difficulty:3,explanation:'由f(x)=(e^x-e^-x)⋅x^3⇒f(-x)=f(x),且x∈(0,+∞)时,f(x)是增函数. 又由f(log_2m)+f(log_0,5m)≤2((e^2-1)/(e))⇒f(log_2m)≤f(1). 所以(log_2m)≤1⇒-1≤log_2m≤1⇒(1)/(2)≤m≤2. 即m的取值范围是((1)/(2),2).'},
  {id:273,question:'集合M是集合A={1，2，…，100}的子集，且M中至少含有一个平方数或者立方数，则这种子集M的个数是',answer:'2^88(2^12-1).',source:'2021年江西预赛',knowledge:'集合',year:2021,difficulty:3,explanation:'集合A={1,2,⋯,100} 中的平方或者立方数构成集合B={1,4,8,9,16,25,27,36,49,64,81 ,100}, 其中有12个元素,从A 中挖去集合B 后剩下的元索构成集合C ,则C 中有88个元索, 由于C 的子集有2^88 个,B 的非空子集有2^12-1 个, 集M 可表示为M=B_0∪C_0 形式,其中B_0 是B 的任一非空子集,C_0 是C 的任一子集,因此M 的个数为2^88(2^12-1).'},
  {id:274,question:'若整数a 、b 、c 满足:0≤a≤10,0≤b≤10,0≤c≤10,10≤a+b+c≤20 ,则满足条件的有序数组(a,b,c) 共有组',answer:'891',source:'2021年福建预赛',knowledge:'数论',year:2021,difficulty:3,explanation:'解法一:设a+b=t ,则0≤t≤20 . 当0≤t≤10 时，满足条件的有序数对(a,b) 有t+1 对； 此时,10-t≤c≤10,c 的取值有t+1 种情形，满足条件的有序数组(a,b,c) 有(t+1)^2 组. 当11≤t≤20 时，满足条件的有序数对有21-t 对：此时，0≤c≤20-t,c 的取值有21-t 种情形，满足条件的有序数组有(21-t)^2 组. 所以，满足条件的有序数组(a,b,c) 共有： SUM_{m=0}^{10}((t+1)^2)+SUM_{t=11}^{20}((21-t)^2)=2(1^2+2^2+⋯+10^2)+11^2=2×(10×11×21)/(6)+121=891 组. 解法二:设a+b+c=k. 当k=10 时，满足条件的有序数组(a,b,c) 有C122 组. 当11≤k≤20 时，满足条件的有序数组(a,b,c) 有Ck+22-3Ck-92 组. 所以，满足条件的有序数组(a,b,c) 共有： C122+SUM_{k=11}^{20}((Ck+22-3Ck-92))=(C122+C132+⋯+C222)-3(C22+C32+⋯+C112) =(C22+C32+⋯+C222)-4(C22+C32+⋯+C112) =C233-4C123=(23×22×21)/(6)-4×(12×11×10)/(6)=891 组.'},
  {id:275,question:'已知a、b、c、d为正数,且a+20b=c+20d=2. 则(1)/(a)+(1)/(bcd) 的最小值为',answer:'(441)/(2)',source:'2020年福建预赛',knowledge:'不等式',year:2020,difficulty:3,explanation:'由条件知0&lt;cd=(1)/(20)⋅c⋅20d⩽(1)/(20)((c+20d)/(2))^2=(1)/(20) . 则(1)/(a)+(1)/(bcd)⩾(1)/(a)+(20)/(b)=(1)/(2)((1)/(a)+(20)/(b))(a+20b)=(1)/(2)(401+(20b)/(a)+(20a)/(b))⩾(1)/(2)(401+2sqrt((20b)/(a)⋅(20a)/(b)))=(441)/(2), 当且仅当c=20d 且(20b)/(a)=(20a)/(b) ,即 a=b=(2)/(21),c=1,d=(1)/(20) 时,上式等号成立. 故(1)/(a)+(1)/(bcd) 的最小值为(441)/(2).'},
  {id:276,question:'设a_1,a_2,⋯,a_10是1,2,⋯,10的一个随机排列，则在a_1a_2,a_2a_3,⋯,a_9a_10这9个数中既出现9又出现12的概率为',answer:'(7)/(90)',source:'2021年全国高中数学联赛B卷一试',knowledge:'概率',year:2021,difficulty:4,explanation:'一个随机排列满足要求当且仅当该排列中1,9两数相邻,且2,6与3,4中至少有一对数相邻.现计算这样的排列的个数N.设这些排列中2,6相邻的排列有N_1个，3,4相邻的排列有N_2个,2,6与3,4两对数都相邻的排列有N_3个. 为计算N_1,先将1,9两数“捆绑”,2,6两数“捆绑”,并将它们与剩下的6个数进行排列，有8!种方式,又考虑到1,9的次序与2,6的次序,得N_1=2^2×8!. 类似可知N_2=2^2×8!, N_3=2^3×7!. 由容斥原理，N=N_1+N_2-N_3=8×(8!-7!)=7×8!. 因此,所求概率为(N)/(10!)=(7)/(90).'},
  {id:277,question:'已知四个整数a,b,c,d都是偶数，且0&lt;a&lt;b&lt;c&lt;d,d-a=90 ,若a,b,c成等差数列，b,c,d成等比数列，则a+b+c+d=',answer:'194',source:'2021年吉林预赛',knowledge:'不等式',year:2021,difficulty:3,explanation:'由题设知a+c=2b,bd=c^2,d-a=90 ,消去c,d,得b(a+90)=(2b-a)^2 . 即90b=(4b-a)(b-a) ,因为4b-a≡b-a( mod 6) ,所以4b-a,b-a 都是6的倍数, 又因为3b&lt;4b-a&lt;4b ,所以22.5&lt;b-a&lt;30 ,故b-a=24 , 从而4b-a=(15)/(4)b ,即b=4a ,从而c=7a,d=(49)/(4)a ,故(49)/(4)a-a=90 . 所以a=8, b=32,c=56,d=98 ,故a+b+c+d=8+32+56+98=194 .'},
  {id:278,question:'设复数z=x+yi 的实虚部x,y所形成的点(x,y) 在椭圆(x^2)/(9)+(y^2)/(16)=1 上。若(z-1-i)/(z-i) 为实数，则复数z=',answer:'(3sqrt(15))/(4)+i 或 -(3sqrt(15))/(4)+i',source:'2021年浙江预赛',knowledge:'复数',year:2021,difficulty:3,explanation:'由 (z-1-i)/(z-i)=1-(1)/(x+(y-1)i) , 所以 y=1 , 则 x=±(3sqrt(15))/(4) , 所以 z=(3sqrt(15))/(4)+i 或 z=-(3sqrt(15))/(4)+i .'},
  {id:279,question:'若5π 是函数f(x)=cosnx⋅sin(80)/(n^2)x 的一个周期,则正整数n 的所有可能取值为',answer:'2,10',source:'2021年福建预赛',knowledge:'三角函数',year:2021,difficulty:3,explanation:'由5π 是函数f(x)=cosnx⋅sin(80)/(n^2)x 的一个周期，得： f(5π)=cos5nπ⋅sin(80)/(n^2)⋅5π=f(0)=0 ， 由于n 为正整数吋,cos5nπ=±1≠0 ,于是sin(400)/(n^2)π=0 . 所以，(400)/(n^2)π=kπ (k∈Z),n^2∣400 . 于是,n=1,2,4,5,10,20. 将n=1,2,4,5,10,20 逐一代入验证可矢,n=2,10. 所以，正整数n 的所有可能取值为2，10.'},
  {id:280,question:'在平面直角坐标系xOy中,已知抛物线y=ax^2-3x+3(a≠0)的图像与拋物线y^2=2px(p&gt;0)的图像关于直线y=x+m对称,则实数a,p,m的乘积为',answer:'-3',source:'2021年全国高中数学联赛B卷一试',knowledge:'解析几何',year:2021,difficulty:4,explanation:'对拋物线y=ax^2-3x+3上任意一点(x_0,y_0), 有y_0=ax02-3x_0+3 ① 设点(x_0,y_0)关于直线y=x+m的对称点为(x_1,y_1). 由(y_1+y_0)/(2)=(x_1+x_0)/(2)+m,x_1+y_1=x_0+y_0,可知x_1=y_0-m,y_1=x_0+m, 因(x_1,y_1)在拋物线y^2=2px上,故(x_0+m)^2=2p(y_0-m), 这等价于y_0=(1)/(2p)x02+(m)/(p)x_0+(m^2)/(2p)+m ② 由点(x_0,y_0)取法的任意性,比较①、②得(1)/(2p)=a,(m)/(p)=-3,(m^2)/(2p)+m=3. 因此有3=(m)/(p)⋅(m)/(2)+m=-3⋅(m)/(2)+m=-(m)/(2),解得m=-6, 故依次可得p=2,a=(1)/(4)（满足a≠0且p&gt;0).从而apm=2⋅(1)/(4)⋅(-6)=-3.'},
  {id:281,question:'设m为实数,复数z_1=1+2i,z_2=m+3i(这里i为虚数单位),若z_1⋅z_2为纯虚数，则(z_1+z_2)的值为',answer:'5sqrt(2)',source:'2021年全国高中数学联赛B卷一试',knowledge:'复数',year:2021,difficulty:4,explanation:'由于z_1⋅overline(z_2)=(1+2i)(m-3i)=m+6+(2m-3)i为纯虚数,故m=-6. 所以(z_1+z_2)=(-5+5i)=5sqrt(2).'},
  {id:282,question:'某竹竿长为24米,一端直在墙上,另一端落在地面上.若竹竿上某一节点到墙的垂直距离和到地面的垂直距离均为7米,则此时竹竿靠在墙上的端点到地面的垂直距离为或',answer:'16±4sqrt(2)',source:'2020年浙江预赛',knowledge:'解析几何',year:2020,difficulty:3,explanation:'如图2,设l_AB:y=k(x-7)+7 ， 则A(0,7-7k) ,B(7-(7)/(k),0) . 故(7-7k)^2+(7-(7)/(k))^2=24^2 ⇒k^2-2k+1+(1)/(k^2)-(2)/(k)+1=((24)/(7))^2 ⇒(k+(1)/(k))^2-2(k+(1)/(k))+1=((25)/(7))^2 ⇒k+(1)/(k)=1±(25)/(7) ⇒k+(1)/(k)=-(18)/(7) ⇒k=-(9)/(7)±(4sqrt(2))/(7) ⇒7(1-k)=7((16)/(7)∓(4sqrt(2))/(7))=16±4sqrt(2) .'},
  {id:283,question:'对于正整数n ,若(xy-5x+3y-15)^n 展开式经同类项合并，x^iy^j(i,j=0,1,⋯,n) 合并后至少有2021项,则n 的最小值为',answer:'44',source:'2021年浙江预赛',knowledge:'组合',year:2021,difficulty:3,explanation:'由 (xy-5x+3y-15)^n=(x+3)^n(y-5)^n , 共有 (n+1)^2 项, 所以 (n+1)^2≥2021 , 得 n≥sqrt(2021)-1 , 则 n_min=44 .'},
  {id:284,question:'设sinα+sinβ=(4)/(5)sqrt(2), cosα+cosβ=(4)/(5)sqrt(3) ,则tanα+tanβ=',answer:'sqrt(6)',source:'2021年广西预赛',knowledge:'三角函数',year:2021,difficulty:3,explanation:'tan(α+β)/(2)=(sinα+sinβ)/(cosα+cosβ)=(sqrt(2))/(sqrt(3)), cos(α-β)=(3)/(5) . 故tanα+tanβ=(sin(α+β))/(cosαcosβ)=(2sin(α+β))/(cos(α-β)+cos(α+β))=sqrt(6).'},
  {id:285,question:'在△ABC 中,∠B=∠C=30^°,BC=2sqrt(3),P,Q 分别在线段AB和AC上,AP=1,AQ=sqrt(2) ,直线AD⊥BC 于D 。现将三角形△ABC 沿着AD对折，当平面ADB与平面ADC的二面角为60°时，则线段PQ的长度为',answer:'sqrt(3-(5sqrt(2))/(4))',source:'2021年浙江预赛',knowledge:'三角函数',year:2021,difficulty:3,explanation:'依题意可知∠BDC=60^∘ ，又BD=CD=sqrt(3) ，所以BC=sqrt(3) ，所以cos∠PAQ=(AP^2+AQ^2-PQ^2)/(2AP⋅AQ)=(AB^2+AC^2-BC^2)/(2AB⋅AC) ，即(3-PQ^2)/(2sqrt(2))=(5)/(8) , 可得 PQ=sqrt(3-(5sqrt(2))/(4)) .'},
  {id:286,question:'已知复数z_1,z_2 满足(z_1)=(z_1-2z_2), z_1overline(z_2)=sqrt(3)(1-i), i 为叙述单位，则(z_1)/(z_2)=',answer:'1-i',source:'2021年重庆预赛',knowledge:'复数',year:2021,difficulty:3,explanation:'由(z_1)=(z_1-2z_2) 知(z_1)^2=(z_1)^2+4(z_2)^2-2(z_1overline(z_2)+overline(z_1)z_2) , 则z_2overline(z_2)=(1)/(2)(z_1overline(z_2)+overline(z_1)z_2)=Re(z_1overline(z_2))=sqrt(3) . 所以(z_1)/(z_2)=(z_1overline(z_2))/(z_2overline(z_2))=1-i .'},
  {id:287,question:'已知n是正整数，且7^n+2n 能被57整除，则n的最小值为',answer:'25',source:'2021年新疆预赛',knowledge:'数论',year:2021,difficulty:3,explanation:'方法一：因为7^3≡1( mod 57) , ①若n=3k,k∈N^* ,则7^n≡7^3k≡1( mod 57) ,因此7^n+2n≡2n+1≡6k+1≡0( mod 57) , 即57∣6k+1 ,而3∤6k+1 ,因此57∤6k+1 ，此时无解. ②若n=3k+1,k∈N ,则7^n≡7^3k+1≡7( mod 57) , 因此7^n+2n≡2n+7≡6k+9≡0( mod 57) , 即57∣6k+9 ,因此19∣2k+3, k_min=8 ,此时n=25 . ③若n=3k+2,k∈N ,则7^n≡7^3k+2≡49( mod 57) , 因此7^n+2n≡2n+49≡6k+53≡6k-4≡0( mod 57) , 即57∣6k-4 ,而3∤6k-4 ,因此57∤6k-4 ,此时无解. 所述:n_min=25 . 方法二:设n=3q+r, r∈{0,1,2} ,注意到7^3-1=(7-1)(7^2+7+1)=6×57 , 所以∃k∈Z ,使得： 7^n-7^r=7^3q+r-7^r=7^r(7^3q-1)=7^r(7^3-1)(7^3q-3+7^3q-6+…+7^3+1)=57k . 因此57∣7^n+2n 等价于57∣7^r+2n. (1)当r=0 时，n=3q, q∈N^* ,则57∣6q+1 ,而3∤6q+1 ,因此57∤6q+1 ,此时无解 (2)当r=1 时，n=3q+1,q∈N ,则57∣6q+9 ,因此19∣2q+3, q_min=8 ,此时n=25 . (3)当r=2 时，n=3q+2,q∈N ,则57∣6q-4 ,而3∤6q-4 ,因此57∤6q-4 ,此时无解. 综上所述:n_min=25 .'},
  {id:288,question:'设集合A={1,2,m},其中m为实数.令B=(a^2∣a∈A),C=A∪B.若C的所有元素之和为6,则C的所有元素之积为',answer:'-8',source:'2021年全国高中数学联赛A卷一试',knowledge:'集合',year:2021,difficulty:5,explanation:'由条件知1,2,4,m,m^2(允许有重复）为C的全部元素. 注意到,当m为实数时,1+2+4+m+m^2&gt;6,1+2+4+m^2&gt;6,故只可能是C={1,2,4,m},且1+2+4+m=6.于是m=-1(经检验符合题意),此时C的所有元素之积为1×2×4×(-1)=-8.'},
  {id:289,question:'若正实数x，y满足x（x+2y）=9，则x5y的最大值为',answer:'54',source:'2021年福建预赛',knowledge:'不等式',year:2021,difficulty:3,explanation:'解法一：由题设及平均不等式知： 9=x(x+2y)=x((1)/(2)x+(1)/(2)x+2y)≥x⋅3root(3)((1)/(2)x⋅(1)/(2)x⋅2y) . 所以,3^3≥x^3⋅(1)/(2)x⋅(1)/(2)x⋅2y,x^5y≤2⋅3^3=54 , 当且仅当(1)/(2)x=2y ,即x=sqrt(6), y=(sqrt(6))/(4) 时等号成立. 所以,最大值为54. 解法二：由题意可得y=(1)/(2)((9)/(x)-x) (0&lt;x&lt;3) . 所以,x^5y=x^5⋅(1)/(2)((9)/(x)-x)=(1)/(2)(9x^4-x^6) ， 设f(x)=(1)/(2)(9x^4-x^6) ,则f^\'(x)=(1)/(2)(36x^3-6x^5)=-3x^3(x-sqrt(6))(x+sqrt(6)) , 0&lt;x&lt;sqrt(6) 时,f^\'(x)&gt;0;sqrt(6)&lt;x&lt;3 时,f^\'(x)&lt;0 . 所以,f(x) 在区间(0,sqrt(6)] 上单调递增，在区间[sqrt(6),3) 上单调递减 所以，x=sqrt(6) 时，f(x) 有最大值f(sqrt(6))=54 . 因此,x=sqrt(6),y=(sqrt(6))/(4) 时，x^5y 取最大值54. 所以，x^5y 的最大值为54.'},
  {id:290,question:'已知O 为坐标原点,曲线C_1:x^2-y^2=1 与曲线C_2:y^2=2px 交于点M、N.若△OMN 的外接圆经过点P((7)/(2),0) ,则曲线C_2 的方程为',answer:'y^2=(3)/(2)x',source:'2020年广西预赛',knowledge:'解析几何',year:2020,difficulty:3,explanation:'如图2,设点M(x_0,y_0),N(x_0,-y_0) , T 为MN与x 轴的交点.则T(x_0,0). 因为O、M、P、N四点共圆,所以,由相交弦定理得OT⋅TP=MT⋅TN ⇒x_0((7)/(2)-x_0)=y02=2px_0(x_0&gt;0) . 解得x_0=(7)/(2)-2p ， y02=2px_0=7p-4p^2 代人曲线C_1 的方程得((7)/(2)-2p)^2-(7p-4p^2)=1 ⇒32p^2-84p+45=0 . 解得p=(15)/(8)( 舍去)或p=(3)/(4) . 故曲线C_2 的方程为y^2=(3)/(2)x.'},
  {id:291,question:'已知f(x) 和g(x) 是两个二次项系数均为1的二次函数.若g(6)=35 ,(f(-1))/(g(-1))=(f(1))/(g(1))=(21)/(20) ,则f(6)=',answer:'35',source:'2021年福建预赛',knowledge:'函数',year:2021,difficulty:3,explanation:'解法一:设f(x)=x^2+ax+b,g(x)=x^2+cx+d , 则由题设条件可得： 20(1-a+b)=21(1-c+d) ⋯⋯⋯(1), 20(1+a+b)=21(1+c+d) ⋯⋯⋯(2) ， (1)、(2)两式左右两边分别相加，得40+40b=42+42d,20b=1+21d ； (1)、(2)两式左右两边分别相减，得-40a=-42c,20a=21c . 另由g(6)=35 ,得36+6c+d=35 . 所以,36+6×(20)/(21)a+(20b-1)/(21)=35, 6a+b=-1 . 所以,f(6)=36+6a+b=35 . 解法二:设h(x)=21g(x)-20f(x) ,则由条件知h(x) 是二次项系数为1的二次函数. 又h(-1)=2lg(-1)-20f(-1)=0, h(1)=2lg(1)-20f(1)=0 , 所以,h(x)=(x+1)(x-1)=x^2-1 . 因此，h(6)=21g(6)-20f(6)=6^2-1=35 . 所以,21×35-20f(6)=35,f(6)=35 .'},
  {id:292,question:'设点P 在椭圆(x^2)/(5)+y^2=1 上，F_1,F_2 是该椭圆的两个焦点，若△F_1PF_2 的面积为(sqrt(3))/(3) ,则∠F_1PF_2=',answer:'(π)/(3)',source:'2021年广西预赛',knowledge:'解析几何',year:2021,difficulty:3,explanation:'设∠F_1PF_2=θ,PF_1=m,PF_2=n ,则(m+n=2sqrt(5); (1)/(2)mnsinθ=(sqrt(3))/(3); m^2+n^2-2mncosθ=16) ,解得θ=(π)/(3) .'},

// ===== 全局状态 =====// ===== 全局状态 =====
let filteredQuestions = [];
let currentIndex = 0;
let userAnswers = {};   // { questionIndex: "用户答案" }
let results = {};       // { questionIndex: "correct"/"wrong" }

// ===== 初始化 =====
function init() {
  // 每次打开随机打乱题目顺序
  shuffleArray(QUESTIONS);
  filteredQuestions = [...QUESTIONS];
  populateFilters();
  renderQuestion();
  updateStats();
}

// Fisher-Yates 洗牌算法
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ===== 填充筛选选项 =====
function populateFilters() {
  const knowledges = [...new Set(QUESTIONS.map(q => q.knowledge))];
  const years = [...new Set(QUESTIONS.map(q => q.year))].sort((a,b) => b-a);
  const sources = [...new Set(QUESTIONS.map(q => q.source))].sort();
  
  const kSel = document.getElementById('filterKnowledge');
  knowledges.forEach(k => { const o = document.createElement('option'); o.value = k; o.textContent = k; kSel.appendChild(o); });
  
  const ySel = document.getElementById('filterYear');
  years.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y + '年'; ySel.appendChild(o); });
  
  const sSel = document.getElementById('filterSource');
  sources.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sSel.appendChild(o); });
}

// ===== 筛选逻辑 =====
function applyFilter() {
  const k = document.getElementById('filterKnowledge').value;
  const d = document.getElementById('filterDifficulty').value;
  const y = document.getElementById('filterYear').value;
  const s = document.getElementById('filterSource').value;
  
  filteredQuestions = QUESTIONS.filter(q => {
    if (k && q.knowledge !== k) return false;
    if (d && q.difficulty !== parseInt(d)) return false;
    if (y && q.year !== parseInt(y)) return false;
    if (s && q.source !== s) return false;
    return true;
  });
  currentIndex = 0;
  renderQuestion();
}

function resetFilter() {
  document.getElementById('filterKnowledge').value = '';
  document.getElementById('filterDifficulty').value = '';
  document.getElementById('filterYear').value = '';
  document.getElementById('filterSource').value = '';
  filteredQuestions = [...QUESTIONS];
  currentIndex = 0;
  renderQuestion();
}

// ===== 翻页 =====
function changePage(dir) {
  currentIndex += dir;
  renderQuestion();
}

// ===== 更新统计 =====
function updateStats() {
  const total = Object.keys(results).length;
  const correct = Object.values(results).filter(r => r === 'correct').length;
  const wrong = total - correct;
  const rate = total > 0 ? Math.round(correct / total * 100) : 0;
  
  document.getElementById('answeredCount').textContent = total;
  document.getElementById('totalCount').textContent = QUESTIONS.length;
  
  if (total > 0) {
    document.getElementById('statsPanel').style.display = 'block';
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statCorrect').textContent = correct;
    document.getElementById('statWrong').textContent = wrong;
    document.getElementById('statRate').textContent = rate + '%';
    document.getElementById('progressFill').style.width = (total / QUESTIONS.length * 100) + '%';
  }
}

// ===== 符号键盘开关 =====
function toggleKeyboard() {
  const kb = document.getElementById('mathKeyboard');
  kb.classList.toggle('show');
}

// ===== 插入数学符号 =====
function insertSymbol(sym) {
  const input = document.getElementById('answerInput');
  if (!input || input.disabled) return;
  const start = input.selectionStart;
  const end = input.selectionEnd;
  const val = input.value;
  input.value = val.substring(0, start) + sym + val.substring(end);
  input.selectionStart = input.selectionEnd = start + sym.length;
  input.focus();
}

// ===== 提交答案 =====
function submitAnswer(qIdx) {
  const input = document.getElementById('answerInput');
  const userAns = input.value.trim();
  if (!userAns) { alert('请输入答案'); return; }
  userAnswers[qIdx] = userAns;
  
  const q = QUESTIONS[qIdx];
  const isCorrect = checkAnswer(userAns, q.answer);
  results[qIdx] = isCorrect ? 'correct' : 'wrong';
  
  renderQuestion();
  updateStats();
}

// ===== 答案判定系统（数值兼容性判断）=====
function checkAnswer(userAns, correctAns) {
  // 1. 精确字符串匹配（去除首尾空格、统一全角半角）
  const u = normalizeString(userAns);
  const c = normalizeString(correctAns);
  if (u === c) return true;
  
  // 2. 数值等价判断
  // 尝试将两个答案都转为数值
  const uNum = tryParseNumber(u);
  const cNum = tryParseNumber(c);
  if (uNum !== null && cNum !== null && Math.abs(uNum - cNum) < 1e-9) return true;
  
  // 3. 分数等价判断：如 "2/9" 和 "0.222..." 等
  const uFrac = tryParseFraction(u);
  const cFrac = tryParseFraction(c);
  if (uFrac !== null && cFrac !== null && Math.abs(uFrac - cFrac) < 1e-9) return true;
  if (uNum !== null && cFrac !== null && Math.abs(uNum - cFrac) < 1e-9) return true;
  if (uFrac !== null && cNum !== null && Math.abs(uFrac - cNum) < 1e-9) return true;
  
  // 4. 根号等价：如 "√2" ≈ "1.414" 
  const uRad = tryParseRadical(u);
  const cRad = tryParseRadical(c);
  if (uRad !== null && cRad !== null && Math.abs(uRad - cRad) < 1e-9) return true;
  if (uNum !== null && cRad !== null && Math.abs(uNum - cRad) < 1e-6) return true;
  if (uRad !== null && cNum !== null && Math.abs(uRad - cNum) < 1e-6) return true;
  
  // 5. 含π的等价：如 "2π" ≈ "6.283"
  const uPi = tryParsePiExpression(u);
  const cPi = tryParsePiExpression(c);
  if (uPi !== null && cPi !== null && Math.abs(uPi - cPi) < 1e-6) return true;
  if (uNum !== null && cPi !== null && Math.abs(uNum - cPi) < 1e-4) return true;
  if (uPi !== null && cNum !== null && Math.abs(uPi - cNum) < 1e-4) return true;
  
  // 6. 幂次等价：如 "2^10" = "1024", "2¹⁰" = "1024"
  const uPow = tryParsePower(u);
  const cPow = tryParsePower(c);
  if (uPow !== null && cPow !== null && Math.abs(uPow - cPow) < 1e-9) return true;
  if (uNum !== null && cPow !== null && Math.abs(uNum - cPow) < 1e-6) return true;
  if (uPow !== null && cNum !== null && Math.abs(uPow - cNum) < 1e-6) return true;
  
  return false;
}

// 标准化字符串：全角→半角，去空格
function normalizeString(s) {
  return s.replace(/[\uff10-\uff19]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
          .replace(/．/g, '.').replace(/，/g, ',').replace(/（/g, '(').replace(/）/g, ')')
          .replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&')
          .replace(/\s+/g, '').trim();
}

// 尝试解析数值
function tryParseNumber(s) {
  // 去除末尾的句号（OCR常见错误）
  const clean = s.replace(/\.+$/, '');
  const n = Number(clean);
  return isNaN(n) ? null : n;
}

// 尝试解析分数
function tryParseFraction(s) {
  // 匹配 "a/b" 格式
  const m = s.match(/^(-?\d+)\/(\d+)$/);
  if (m) {
    const num = parseInt(m[1]), den = parseInt(m[2]);
    if (den !== 0) return num / den;
  }
  return null;
}

// 尝试解析根号表达式
function tryParseRadical(s) {
  // √2, ∛27, √(3) 等
  const m1 = s.match(/^√(\d+)$/);
  if (m1) return Math.sqrt(parseInt(m1[1]));
  const m2 = s.match(/^∛(\d+)$/);
  if (m2) return Math.cbrt(parseInt(m2[1]));
  // √(a/b) 形式
  const m3 = s.match(/^√\((\d+)\/(\d+)\)$/);
  if (m3) return Math.sqrt(parseInt(m3[1]) / parseInt(m3[2]));
  return null;
}

// 尝试解析含π的表达式
function tryParsePiExpression(s) {
  // 2π, π/3, -π/2 等
  const m1 = s.match(/^(-?\d*)π$/);
  if (m1) { const coeff = m1[1] === '' || m1[1] === '-' ? (m1[1] === '-' ? -1 : 1) : parseInt(m1[1]); return coeff * Math.PI; }
  const m2 = s.match(/^(-?\d*)π\/(\d+)$/);
  if (m2) { const coeff = m2[1] === '' || m2[1] === '-' ? (m2[1] === '-' ? -1 : 1) : parseInt(m2[1]); return coeff * Math.PI / parseInt(m2[2]); }
  return null;
}

// 尝试解析幂次表达式
function tryParsePower(s) {
  // a^b 或 aⁿ (Unicode上标)
  const m1 = s.match(/^(-?\d+)\^(\d+)$/);
  if (m1) return Math.pow(parseInt(m1[1]), parseInt(m1[2]));
  // Unicode上标转换
  const supMap = {'⁰':0,'¹':1,'²':2,'³':3,'⁴':4,'⁵':5,'⁶':6,'⁷':7,'⁸':8,'⁹':9,'ⁿ':null};
  const m2 = s.match(/^(-?\d+)([⁰¹²³⁴⁵⁶⁷⁸⁹]+)$/);
  if (m2) {
    let exp = 0;
    for (const ch of m2[2]) {
      if (supMap[ch] === null) return null;
      exp = exp * 10 + supMap[ch];
    }
    return Math.pow(parseInt(m2[1]), exp);
  }
  return null;
}

// ===== 计时练习模式 =====
let timedMode = false;
let timedQuestions = [];      // 当前计时练习的8道题
let timedIndex = 0;           // 当前题号
let timedTimerId = null;      // 定时器ID
let timedRemaining = 30 * 60; // 剩余秒数（30分钟）
let timedAnswers = {};        // 用户答案
let timedResults = {};        // 判定结果
let timedStartTime = null;    // 开始时间

function startTimedPractice() {
  if (timedMode) {
    if (confirm('正在计时练习中，确定要重新开始吗？')) {
      exitTimedPractice();
    } else {
      return;
    }
  }
  
  // 从100道题中随机选8道：确保各模块覆盖+难度梯度均匀
  timedQuestions = selectBalancedQuestions(8);
  timedIndex = 0;
  timedAnswers = {};
  timedResults = {};
  timedRemaining = 30 * 60;
  timedMode = true;
  timedStartTime = Date.now();
  
  // 切换UI
  document.getElementById('timedPanel').style.display = 'block';
  document.querySelector('.filter-bar').style.display = 'none';
  document.querySelector('.stats-panel').style.display = 'none';
  
  // 渲染第一道题
  renderTimedQuestion();
  
  // 启动倒计时
  updateTimedTimer();
  timedTimerId = setInterval(() => {
    timedRemaining--;
    updateTimedTimer();
    if (timedRemaining <= 0) {
      clearInterval(timedTimerId);
      finishTimedPractice();
    }
  }, 1000);
}

function selectBalancedQuestions(count) {
  // 难度梯度：2道基础(1) + 4道中等(2) + 2道困难(3)
  const diffTargets = {1: 2, 2: 4, 3: 2};
  
  // 知识点覆盖：尽量选不同知识点
  const allKnowledges = [...new Set(QUESTIONS.map(q => q.knowledge))];
  const knowledgeTarget = Math.min(3, Math.ceil(count / allKnowledges.length)); // 每个知识点最多选3道
  
  let selected = [];
  let selectedIds = new Set();
  let knowledgeCount = {};
  
  // 按难度分层选择
  for (const [diff, need] of Object.entries(diffTargets)) {
    const pool = QUESTIONS.filter(q => q.difficulty == diff && !selectedIds.has(q.id));
    // 打乱
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    
    let picked = 0;
    for (const q of shuffled) {
      if (picked >= need) break;
      const kc = knowledgeCount[q.knowledge] || 0;
      if (kc >= knowledgeTarget) continue; // 同一知识点不要太多
      
      selected.push(q);
      selectedIds.add(q.id);
      knowledgeCount[q.knowledge] = kc + 1;
      picked++;
    }
    
    // 如果该难度层不够，从其他难度补充
    if (picked < need) {
      const extraPool = QUESTIONS.filter(q => !selectedIds.has(q.id));
      const extraShuffled = [...extraPool].sort(() => Math.random() - 0.5);
      for (const q of extraShuffled) {
        if (picked >= need) break;
        const kc = knowledgeCount[q.knowledge] || 0;
        if (kc >= knowledgeTarget + 1) continue;
        selected.push(q);
        selectedIds.add(q.id);
        knowledgeCount[q.knowledge] = kc + 1;
        picked++;
      }
    }
  }
  
  // 如果还不够count道，从剩余题目中补充
  if (selected.length < count) {
    const extraPool = QUESTIONS.filter(q => !selectedIds.has(q.id));
    const extraShuffled = [...extraPool].sort(() => Math.random() - 0.5);
    for (const q of extraShuffled) {
      if (selected.length >= count) break;
      selected.push(q);
      selectedIds.add(q.id);
    }
  }
  
  // 打乱最终顺序
  return selected.sort(() => Math.random() - 0.5);
}

function updateTimedTimer() {
  const mins = Math.floor(timedRemaining / 60);
  const secs = timedRemaining % 60;
  const timerEl = document.getElementById('timedTimer');
  timerEl.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  
  // 颜色变化
  timerEl.classList.remove('warning', 'danger');
  if (timedRemaining <= 60) timerEl.classList.add('danger');
  else if (timedRemaining <= 300) timerEl.classList.add('warning');
}

function renderTimedQuestion() {

  const wrongCount = Object.values(timedResults).filter(r => r === 'wrong').length;
  const answeredCount = Object.keys(timedResults).length;
  document.getElementById('timedProgress').textContent = `${answeredCount} / ${timedQuestions.length} 已答`;
  document.getElementById('timedProgFill').style.width = (answeredCount / timedQuestions.length * 100) + '%';
  document.getElementById('timedCorrect').textContent = '✓ ' + correctCount;
  document.getElementById('timedWrong').textContent = '✗ ' + wrongCount;
  document.getElementById('timedSkip').textContent = '- ' + (timedQuestions.length - answeredCount);
  
  // 8题同屏渲染
  let html = '';
  for (let i = 0; i < timedQuestions.length; i++) {
    const q = timedQuestions[i];

    const isCorrect = timedResults[i] === 'correct';
    const userAns = timedAnswers[i] || '';
    
    html += `
      <div class="question-card timed-q-card ${answered ? (isCorrect ? 'timed-correct' : 'timed-wrong') : ''}">
        <div class="q-header">
          <span class="q-number">第 ${i + 1} 题</span>
          <div class="q-tags">

            <span class="q-tag tag-difficulty-${q.difficulty}">${diffLabels[q.difficulty]}</span>

        </div>
        <div class="q-text">${q.question}</div>
        <div class="answer-area">
          <input type="text" class="answer-input timed-input" data-idx="${i}" placeholder="输入答案..."
            value="${userAns}" ${answered ? 'disabled' : ''}
            onkeydown="if(event.key==='Enter')submitTimedAnswer(${i})" />
          ${!answered ? `<button class="submit-btn" onclick="submitTimedAnswer(${i})">提交</button>
          <button class="skip-btn" onclick="skipTimedQuestion(${i})">跳过</button>` : ''}
          <button class="kb-toggle" onclick="toggleTimedKb(${i})">⌨ 符号</button>
        </div>

          <div class="kb-section-label">常用运算</div>
          <span class="math-key" onclick="insertTimedSymbol(${i},'+')">+</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'-')">-</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'×')">×</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'÷')">÷</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'=')">=</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'≠')">≠</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'≤')">≤</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'≥')">≥</span>
          <div class="kb-section-label">上下标与根号</div>
          <span class="math-key" onclick="insertTimedSymbol(${i},'²')">²</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'³')">³</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'ⁿ')">ⁿ</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'√')">√</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∛')">∛</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'^')">^</span>
          <div class="kb-section-label">希腊字母</div>
          <span class="math-key" onclick="insertTimedSymbol(${i},'α')">α</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'β')">β</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'θ')">θ</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'π')">π</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'φ')">φ</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'ω')">ω</span>
          <div class="kb-section-label">集合与逻辑</div>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∈')">∈</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∪')">∪</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∩')">∩</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'⊆')">⊆</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∅')">∅</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∀')">∀</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∃')">∃</span>
          <div class="kb-section-label">其他</div>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∞')">∞</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∠')">∠</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'⊥')">⊥</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'∥')">∥</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'·')">·</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'|')">|</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'!')">!</span>
          <span class="math-key" onclick="insertTimedSymbol(${i},'()')">()</span>
        </div>

          ${answered ? `
            <div class="${isCorrect ? 'result-correct' : 'result-wrong'}">
              ${isCorrect ? '✅ 正确' : '❌ 错误'}
            </div>
            <div style="margin-top:6px;font-size:13px;">正确答案：<span class="correct-answer">${q.answer}</span>
            ${!isCorrect ? ` | 你的答案：${userAns || '（跳过）'}` : ''}</div>

  }
  
  // 底部操作栏
  html += `
    <div style="display:flex;gap:12px;margin-top:20px;justify-content:center;position:sticky;bottom:10px;z-index:10;background:#f5f6fa;padding:12px 0;">
      <button class="timer-btn" onclick="finishTimedPractice()" style="font-size:16px;padding:12px 32px;">
        📊 交卷（已答 ${answeredCount}/${timedQuestions.length}）
      </button>
      <button class="filter-btn" onclick="exitTimedPractice()" style="font-size:14px;padding:10px 20px;">← 返回正常练习</button>
    </div>
  `;
  
  container.innerHTML = html;
}

function insertTimedSymbol(idx, sym) {
  const input = document.querySelector(`.timed-input[data-idx="${idx}"]`);
  if (!input || input.disabled) return;
  const start = input.selectionStart;
  const end = input.selectionEnd;
  const val = input.value;
  input.value = val.substring(0, start) + sym + val.substring(end);
  input.selectionStart = input.selectionEnd = start + sym.length;
  input.focus();
}

function toggleTimedKb(idx) {
  const kb = document.getElementById('timedKb' + idx);
  if (!kb) return;
  // 先关闭其他所有键盘
  document.querySelectorAll('.math-keyboard[id^="timedKb"]').forEach(el => {
    if (el !== kb) el.style.display = 'none';
  });
  kb.style.display = kb.style.display === 'none' ? 'flex' : 'none';
}

function submitTimedAnswer(idx) {
  const input = document.querySelector(`.timed-input[data-idx="${idx}"]`);
  if (!input) return;
  const userAns = input.value.trim();
  if (!userAns) { alert('请输入答案'); return; }
  
  const q = timedQuestions[idx];
  timedAnswers[idx] = userAns;
  timedResults[idx] = checkAnswer(userAns, q.answer) ? 'correct' : 'wrong';
  
  renderTimedQuestion();
  
  // 滚动到下一道未答的题
  setTimeout(() => {
    const nextInput = document.querySelector(`.timed-input:not([disabled])`);
    if (nextInput) nextInput.focus();
  }, 100);
}

function skipTimedQuestion(idx) {
  timedAnswers[idx] = '';
  timedResults[idx] = 'wrong';
  renderTimedQuestion();
}

function finishTimedPractice() {
  if (timedTimerId) clearInterval(timedTimerId);
  
  const totalQ = timedQuestions.length;
  const answered = Object.keys(timedResults).length;
  const correct = Object.values(timedResults).filter(r => r === 'correct').length;
  const wrong = answered - correct;
  const skip = totalQ - answered;
  const timeUsed = Math.round((Date.now() - timedStartTime) / 1000);
  const mins = Math.floor(timeUsed / 60);
  const secs = timeUsed % 60;
  
  // 评分：每对一题得4分，共32分
  const score = correct * 4;
  const maxScore = totalQ * 4;
  
  // 评级
  let grade = '', gradeColor = '';
  if (score >= 28) { grade = '🏆 优秀'; gradeColor = '#f1c40f'; }
  else if (score >= 24) { grade = '🥇 良好'; gradeColor = '#2ecc71'; }
  else if (score >= 16) { grade = '📝 中等'; gradeColor = '#3498db'; }
  else { grade = '💪 需加油'; gradeColor = '#e74c3c'; }
  
  const container = document.getElementById('questionContainer');
  container.innerHTML = `
    <div class="question-card timed-result">
      <div style="font-size:24px;font-weight:700;margin-bottom:8px;">⏱ 练习结束</div>
      <div class="timed-result-score" style="color:${gradeColor};">${score}/${maxScore}</div>
      <div style="font-size:20px;color:${gradeColor};margin-bottom:20px;">${grade}</div>
      <div class="timed-result-detail">✅ 答对：${correct} 题</div>
      <div class="timed-result-detail">❌ 答错：${wrong} 题</div>
      <div class="timed-result-detail">⏭ 跳过：${skip} 题</div>
      <div class="timed-result-detail">⏱ 用时：${mins}分${secs}秒</div>
      <div style="margin-top:24px;padding:16px;background:#f8f9fa;border-radius:10px;text-align:left;">
        <div style="font-weight:700;margin-bottom:10px;">📊 逐题回顾</div>
        ${timedQuestions.map((q, i) => {
          const r = timedResults[i];
          const icon = r === 'correct' ? '✅' : '❌';
          const userA = timedAnswers[i] || '（跳过）';
          return `<div style="padding:6px 0;border-bottom:1px solid #eee;font-size:13px;">
            ${icon} 第${i+1}题 [${q.knowledge}] 你的答案：${userA} ${r !== 'correct' ? '→ 正确：' + q.answer : ''}
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:12px;margin-top:24px;justify-content:center;">
        <button class="timer-btn" onclick="startTimedPractice()">再来一轮</button>
        <button class="filter-btn" onclick="exitTimedPractice()">返回自由练习</button>
      </div>
    </div>
  `;
}

function exitTimedPractice() {
  if (timedTimerId) clearInterval(timedTimerId);
  timedMode = false;
  
  // 恢复UI
  document.getElementById('timedPanel').style.display = 'none';
  document.querySelector('.filter-bar').style.display = 'flex';
  
  // 恢复正常模式
  filteredQuestions = [...QUESTIONS];
  currentIndex = 0;
  renderQuestion();
  updateStats();
}

// 启动
window.onload = init;
